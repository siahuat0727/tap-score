<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Score Renderer</title>
  <script src="../vexflow/vexflow.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      background: transparent;
      overflow: hidden;
    }
    #score-container {
      width: 100%;
      height: 100%;
      overflow-x: auto;
      overflow-y: hidden;
      -webkit-overflow-scrolling: touch;
    }
    #score-canvas {
      display: block;
    }
  </style>
</head>
<body>
  <div id="score-container">
    <div id="score-canvas"></div>
  </div>

  <script>
    // -------------------------------------------------------------------------
    // VexFlow setup
    // -------------------------------------------------------------------------
    const { Renderer, Stave, StaveNote, Voice, Formatter,
            Accidental, KeySignature, TimeSignature, Barline,
            StaveConnector, Beam, Fraction, StaveTie, Tuplet, Dot } = Vex.Flow;
    const { Curve } = Vex.Flow;

    const scoreContainer = document.getElementById('score-container');
    const container = document.getElementById('score-canvas');

    // Current render state
    let currentStaticData = null;
    let currentRhythmOverlay = null;
    let currentPlaybackIndex = -1;
    let rhythmViewportWasAutoFollowing = false;
    let rhythmInspectionState = { key: null, pinned: false };
    let rhythmInspectionContext = null;
    let rendererState = _emptyRendererState();

    function _emptyRendererState() {
      return {
        svg: null,
        overlayLayer: null,
        resultHighlightLayer: null,
        measureRenderData: [],
        allDisplayNotes: [],
        allStaves: [],
        noteElementsByIndex: new Map(),
        noteBaseColors: new Map(),
        rhythmOverlayLayout: null,
        rhythmOverlayPhase: null,
        rhythmLiveOverlayHandles: null,
      };
    }

    // -------------------------------------------------------------------------
    // Duration / pitch helpers
    // -------------------------------------------------------------------------

    function midiToPitch(midi) {
      const names = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
      const octave = Math.floor(midi / 12) - 1;
      return names[midi % 12] + '/' + octave;
    }

    // Map beat count to VexFlow duration code.
    // Returns { dur, dotted } where dur is VexFlow string and dotted
    // indicates whether a dot modifier is needed.
    const _durationTable = [
      { beats: 6.0,   dur: 'w',  dotted: true  },
      { beats: 4.0,   dur: 'w',  dotted: false },
      { beats: 3.0,   dur: 'h',  dotted: true  },
      { beats: 2.0,   dur: 'h',  dotted: false },
      { beats: 1.5,   dur: 'q',  dotted: true  },
      { beats: 1.0,   dur: 'q',  dotted: false },
      { beats: 0.75,  dur: '8',  dotted: true  },
      { beats: 0.5,   dur: '8',  dotted: false },
      { beats: 0.375, dur: '16', dotted: true  },
      { beats: 0.25,  dur: '16', dotted: false },
      { beats: 0.1875, dur: '32', dotted: true  },
      { beats: 0.125, dur: '32', dotted: false },
    ];

    function beatsToDurationInfo(beats) {
      let best = _durationTable[_durationTable.length - 1];
      let bestDiff = Infinity;
      for (const entry of _durationTable) {
        const diff = Math.abs(beats - entry.beats);
        if (diff < 0.001) return { dur: entry.dur, dotted: entry.dotted };
        if (diff < bestDiff) { bestDiff = diff; best = entry; }
      }
      console.warn(`No exact duration for ${beats} beats, using ${best.dur}`);
      return { dur: best.dur, dotted: best.dotted };
    }

    function beatsToDuration(beats) {
      return beatsToDurationInfo(beats).dur;
    }

    const _splitEpsilon = 0.001;

    function isStandardSimpleMeter(beatsPerMeasure, beatUnit) {
      return beatUnit === 4 && (beatsPerMeasure === 2 || beatsPerMeasure === 3 || beatsPerMeasure === 4);
    }

    function isOnSubdivisionBoundary(position, subdivision) {
      const posInSubdivision = position % subdivision;
      return posInSubdivision < _splitEpsilon || posInSubdivision > subdivision - _splitEpsilon;
    }

    function isBeamableDurationBeats(beats) {
      const dur = beatsToDuration(beats);
      return dur === '8' || dur === '16' || dur === '32';
    }

    function sameChunkSequence(a, b) {
      if (a.length !== b.length) return false;
      for (let i = 0; i < a.length; i++) {
        if (Math.abs(a[i] - b[i]) > _splitEpsilon) return false;
      }
      return true;
    }

    function buildGreedyChunks(totalBeats, startPosition, measureDuration, effectiveBeatDur, allBeats) {
      const chunks = [];
      let remaining = totalBeats;
      let position = startPosition;

      while (remaining > _splitEpsilon) {
        const measIdx = Math.floor(position / measureDuration + 0.0001);
        const measureStart = measIdx * measureDuration;
        const posInMeasure = position - measureStart;
        const spaceInMeasure = measureDuration - posInMeasure;

        let maxSpace;
        if (!isOnSubdivisionBoundary(posInMeasure, effectiveBeatDur)) {
          const currentBeatIdx = Math.floor(posInMeasure / effectiveBeatDur + 0.0001);
          const nextBeatBoundary = (currentBeatIdx + 1) * effectiveBeatDur;
          const spaceToBeat = nextBeatBoundary - posInMeasure;
          maxSpace = Math.min(spaceToBeat, spaceInMeasure, remaining);
        } else {
          maxSpace = Math.min(spaceInMeasure, remaining);
        }

        let chunk = null;
        for (const d of allBeats) {
          if (d <= maxSpace + _splitEpsilon) {
            chunk = d;
            break;
          }
        }

        if (chunk == null) break;

        chunks.push(chunk);
        position += chunk;
        remaining -= chunk;
      }

      return chunks;
    }

    function buildSplitCandidates(totalBeats, startPosInMeasure, effectiveBeatDur, allBeats) {
      const candidates = [];

      function search(position, remaining, fragments) {
        if (remaining <= _splitEpsilon) {
          if (fragments.length > 1) {
            candidates.push(fragments.slice());
          }
          return;
        }

        for (const chunk of allBeats) {
          if (chunk > remaining + _splitEpsilon) continue;

          const nextPosition = position + chunk;
          const stillHasRemainder = remaining - chunk > _splitEpsilon;
          if (stillHasRemainder && !isOnSubdivisionBoundary(nextPosition, effectiveBeatDur)) {
            continue;
          }

          fragments.push(chunk);
          search(nextPosition, remaining - chunk, fragments);
          fragments.pop();
        }
      }

      search(startPosInMeasure, totalBeats, []);
      return candidates;
    }

    function countFollowingBeamableNotesInBeat(notes, startIndex, startPosInMeasure, beatEnd) {
      let count = 0;
      let position = startPosInMeasure;

      for (let i = startIndex; i < notes.length; i++) {
        const note = notes[i];
        const noteEnd = position + note.beats;
        if (note.tripletGroupId != null || noteEnd > beatEnd + _splitEpsilon) break;
        if (note.isRest || !isBeamableDurationBeats(note.beats)) break;

        count += 1;
        position = noteEnd;
      }

      return count;
    }

    function scoreSplitCandidate(candidate, notes, noteIndex, noteStartPosInMeasure, noteBeats, effectiveBeatDur, greedyChunks) {
      const noteEnd = noteStartPosInMeasure + noteBeats;
      const finalChunk = candidate[candidate.length - 1];
      const finalChunkStart = noteEnd - finalChunk;
      const tailBeatIdx = Math.floor((noteEnd - _splitEpsilon) / effectiveBeatDur + 0.0001);
      const tailBeatStart = tailBeatIdx * effectiveBeatDur;
      const tailBeatEnd = tailBeatStart + effectiveBeatDur;
      const tailIsBeamable = isBeamableDurationBeats(finalChunk) && finalChunkStart >= tailBeatStart - _splitEpsilon;
      const followingBeamableCount = countFollowingBeamableNotesInBeat(notes, noteIndex + 1, noteEnd, tailBeatEnd);

      let beamPenalty = 0;
      // Prefer a tied tail eighth that can beam with the next eighth instead of
      // leaving that next eighth orphaned before a longer note.
      if (followingBeamableCount === 1) {
        beamPenalty += tailIsBeamable ? -1 : 1;
      } else if (followingBeamableCount > 1 && tailIsBeamable) {
        beamPenalty -= 1;
      }

      return {
        fragmentCount: candidate.length,
        beamPenalty,
        greedyTieBreak: sameChunkSequence(candidate, greedyChunks) ? 0 : 1,
      };
    }

    function chooseSimpleMeterSplit(notes, noteIndex, noteStartPosInMeasure, noteBeats, effectiveBeatDur, allBeats, greedyChunks) {
      const candidates = buildSplitCandidates(noteBeats, noteStartPosInMeasure, effectiveBeatDur, allBeats);
      if (candidates.length === 0) return greedyChunks;

      let bestCandidate = greedyChunks;
      let bestScore = scoreSplitCandidate(
        greedyChunks,
        notes,
        noteIndex,
        noteStartPosInMeasure,
        noteBeats,
        effectiveBeatDur,
        greedyChunks,
      );

      for (const candidate of candidates) {
        const score = scoreSplitCandidate(
          candidate,
          notes,
          noteIndex,
          noteStartPosInMeasure,
          noteBeats,
          effectiveBeatDur,
          greedyChunks,
        );

        const isBetter =
          score.fragmentCount < bestScore.fragmentCount ||
          (score.fragmentCount === bestScore.fragmentCount && score.beamPenalty < bestScore.beamPenalty) ||
          (
            score.fragmentCount === bestScore.fragmentCount &&
            score.beamPenalty === bestScore.beamPenalty &&
            score.greedyTieBreak < bestScore.greedyTieBreak
          );

        if (isBetter) {
          bestCandidate = candidate;
          bestScore = score;
        }
      }

      return bestCandidate;
    }

    // -------------------------------------------------------------------------
    // Split notes at beat/measure boundaries and group into measures.
    // Only notes starting off-beat are split at beat boundaries;
    // on-beat notes are only split at measure boundaries.
    // -------------------------------------------------------------------------
    function splitAndGroup(notes, beatsPerMeasure, beatUnit) {
      const measureDuration = beatsPerMeasure * (4 / beatUnit);
      const isCompound = beatUnit === 8 && beatsPerMeasure % 3 === 0;
      const effectiveBeatDur = isCompound ? 3 * (4 / beatUnit) : (4 / beatUnit);
      // Include dotted durations in the lookup table (sorted descending).
      const allBeats = [6.0, 4.0, 3.0, 2.0, 1.5, 1.0, 0.75, 0.5, 0.375, 0.25, 0.1875, 0.125];

      const measures = [];
      let currentMeasure = [];
      let position = 0.0;

      // Identify triplet groups: collect consecutive indices sharing the same
      // tripletGroupId so we can emit them as an atomic unit.
      const tripletGroups = new Map(); // groupId -> [noteIndex, ...]
      for (let i = 0; i < notes.length; i++) {
        const gid = notes[i].tripletGroupId;
        if (gid != null) {
          if (!tripletGroups.has(gid)) tripletGroups.set(gid, []);
          tripletGroups.get(gid).push(i);
        }
      }

      let i = 0;
      while (i < notes.length) {
        const note = notes[i];

        // --- Triplet group handling ---
        // Emit all notes in a triplet group without splitting.
        if (note.tripletGroupId != null) {
          const group = tripletGroups.get(note.tripletGroupId);
          for (const gi of group) {
            const tn = notes[gi];
            // Dart sends effectiveBeats which already includes the 2/3 factor.
            // The VexFlow duration should be the *written* duration (without
            // the 2/3 factor). Written beats = effectiveBeats × 3/2.
            const writtenBeats = tn.beats * 1.5;
            const durInfo = beatsToDurationInfo(writtenBeats);

            currentMeasure.push({
              globalIndex: gi,
              midi: tn.midi,
              isRest: tn.isRest,
              beats: tn.beats,
              duration: durInfo.dur,
              isDotted: durInfo.dotted,
              tieStart: false,
              tieEnd: false,
              tripletGroupId: tn.tripletGroupId,
            });
            position += tn.beats;
          }
          // Skip past all notes in this group.
          i = group[group.length - 1] + 1;

          // Check measure boundary after triplet group.
          const measIdx = Math.floor((position - 0.0001) / measureDuration + 0.0001);
          const measureEnd = (measIdx + 1) * measureDuration;
          if (position >= measureEnd - 0.001) {
            measures.push(currentMeasure);
            currentMeasure = [];
          }
          continue;
        }

        // --- Normal / dotted note handling ---
        const measIdx = Math.floor(position / measureDuration + 0.0001);
        const measureStart = measIdx * measureDuration;
        const posInMeasure = position - measureStart;
        const spaceInMeasure = measureDuration - posInMeasure;
        const greedyChunks = buildGreedyChunks(note.beats, position, measureDuration, effectiveBeatDur, allBeats);
        const shouldUseSimpleMeterSearch =
          isStandardSimpleMeter(beatsPerMeasure, beatUnit) &&
          !note.isRest &&
          note.tripletGroupId == null &&
          greedyChunks.length > 1 &&
          !isOnSubdivisionBoundary(posInMeasure, effectiveBeatDur) &&
          note.beats <= spaceInMeasure + _splitEpsilon;

        const chunks = shouldUseSimpleMeterSearch
          ? chooseSimpleMeterSplit(
              notes,
              i,
              posInMeasure,
              note.beats,
              effectiveBeatDur,
              allBeats,
              greedyChunks,
            )
          : greedyChunks;

        for (let chunkIndex = 0; chunkIndex < chunks.length; chunkIndex++) {
          const chunk = chunks[chunkIndex];
          const durInfo = beatsToDurationInfo(chunk);
          const isTieStart = !note.isRest && chunkIndex < chunks.length - 1;
          const isTieEnd = !note.isRest && chunkIndex > 0;

          currentMeasure.push({
            globalIndex: i,
            midi: note.midi,
            isRest: note.isRest,
            beats: chunk,
            duration: durInfo.dur,
            isDotted: durInfo.dotted,
            tieStart: isTieStart,
            tieEnd: isTieEnd,
            tripletGroupId: null,
          });

          position += chunk;

          const currentMeasureStart = Math.floor((position - _splitEpsilon) / measureDuration + 0.0001) * measureDuration;
          const newPosInMeasure = position - currentMeasureStart;
          if (newPosInMeasure >= measureDuration - _splitEpsilon) {
            measures.push(currentMeasure);
            currentMeasure = [];
          }
        }
        i++;
      }

      if (currentMeasure.length > 0) measures.push(currentMeasure);
      if (measures.length === 0) measures.push([]);

      return measures;
    }

    window.__tapScoreTestHooks = window.__tapScoreTestHooks || {};
    window.__tapScoreTestHooks.splitAndGroupForTest = function(data) {
      const measures = splitAndGroup(data.notes, data.beatsPerMeasure, data.beatUnit);
      const flattened = [];
      for (const measure of measures) {
        for (const note of measure) {
          flattened.push(note);
        }
      }
      return flattened;
    };
    window.__tapScoreTestHooks.buildRhythmPulseDescriptorsForTest = function(data) {
      return _buildRhythmPulseDescriptors(
        data.measureSegments,
        data.measureBoundaryTimesSeconds,
        data.pulseDurationSeconds,
        data.countInDurationSeconds,
        data.totalDurationSeconds,
        data.leadInStartX,
        data.timeZeroX,
      );
    };
    window.__tapScoreTestHooks.activeRhythmPulseIndexForTest = function(data) {
      return _activeRhythmPulseIndex(
        data.playheadTimeSeconds,
        data.pulseDescriptors,
        data.overlayPhase || 'live',
      );
    };

    // -------------------------------------------------------------------------
    // Beat-aware beam grouping with secondary beam breaks
    // -------------------------------------------------------------------------
    function beamNotesInMeasure(vfNotes, displayNotes, beatsPerMeasure, beatUnit) {
      const isCompound = beatUnit === 8 && beatsPerMeasure % 3 === 0;
      const effectiveBeatDur = isCompound ? 3 * (4 / beatUnit) : (4 / beatUnit);
      const eighthDur = 0.5;

      // Compute onset of each note within the measure
      const onsets = [];
      let onset = 0.0;
      for (const dn of displayNotes) {
        onsets.push(onset);
        onset += dn.beats;
      }

      // Group beamable notes by beat
      const beatMap = new Map();
      for (let i = 0; i < displayNotes.length; i++) {
        const dur = vfNotes[i].getDuration();
        const isBeamable = !vfNotes[i].isRest() && (dur === '8' || dur === '16' || dur === '32');
        if (!isBeamable) continue;

        const beatIdx = Math.floor(onsets[i] / effectiveBeatDur + 0.0001);
        if (!beatMap.has(beatIdx)) {
          beatMap.set(beatIdx, { vfNotes: [], onsets: [] });
        }
        beatMap.get(beatIdx).vfNotes.push(vfNotes[i]);
        beatMap.get(beatIdx).onsets.push(onsets[i]);
      }

      const beams = [];
      for (const [beatIdx, group] of beatMap) {
        if (group.vfNotes.length < 2) continue;

        const beam = new Beam(group.vfNotes);

        // In compound meters (6/8, 9/8, 12/8), break secondary beams at
        // eighth-note boundaries to show the sub-beat grouping.
        // In simple meters (4/4, 3/4, 2/4), VexFlow automatically handles
        // secondary beams based on note durations — no manual breaks needed.
        if (isCompound) {
          const beatStart = beatIdx * effectiveBeatDur;
          const breakIndices = [];
          for (let j = 1; j < group.vfNotes.length; j++) {
            const relOnset = group.onsets[j] - beatStart;
            if (relOnset > 0.001) {
              const mod = relOnset % eighthDur;
              if (mod < 0.001 || mod > eighthDur - 0.001) {
                breakIndices.push(j);
              }
            }
          }
          if (breakIndices.length > 0) {
            beam.breakSecondaryAt(breakIndices);
          }
        }
        beams.push(beam);
      }

      return beams;
    }

    function measureFirstMeasureLeadingWidth(clef, staveHeight, staveTop, beatsPerMeasure, beatUnit, keySignatureStr) {
      const measurementHost = document.createElement('div');
      measurementHost.style.position = 'absolute';
      measurementHost.style.visibility = 'hidden';
      measurementHost.style.pointerEvents = 'none';
      measurementHost.style.left = '-10000px';
      measurementHost.style.top = '0';
      document.body.appendChild(measurementHost);

      try {
        const measurementRenderer = new Renderer(measurementHost, Renderer.Backends.SVG);
        measurementRenderer.resize(280, staveHeight);
        const measurementCtx = measurementRenderer.getContext();
        const measurementStave = new Stave(0, staveTop, 240);
        measurementStave.addClef(clef);
        measurementStave.addKeySignature(keySignatureStr);
        measurementStave.addTimeSignature(`${beatsPerMeasure}/${beatUnit}`);
        measurementStave.setContext(measurementCtx).draw();

        if (typeof measurementStave.getNoteStartX === 'function') {
          return Math.max(measurementStave.getNoteStartX() - measurementStave.getX(), 0);
        }

        const modifierEls = measurementHost.querySelectorAll('.vf-clef, .vf-keysignature, .vf-timesignature');
        let rightEdge = 0;
        modifierEls.forEach((el) => {
          const bbox = el.getBBox();
          rightEdge = Math.max(rightEdge, bbox.x + bbox.width);
        });
        return Math.max(rightEdge + 24, 90);
      } finally {
        measurementHost.remove();
      }
    }

    // -------------------------------------------------------------------------
    // Main render function
    // -------------------------------------------------------------------------
    function renderScoreStatic(data) {
      currentStaticData = data;
      _detachRhythmInspectionContext();
      const previousContent = container.innerHTML;
      container.innerHTML = '';
      rendererState = _emptyRendererState();

      try {

      const { clef, restAnchorPitch, beatsPerMeasure, beatUnit, keySignatureStr, alteredPitches,
              accidentalOffset, notes, selectedIndex, cursorIndex,
              selectionKind, title, bpm, showsRhythmOverlay } = data;

      // ---- Layout constants ------------------------------------------------
      const hasTitle = title && title.length > 0;
      const hasTempo = bpm != null;
      const headerHeight = hasTitle ? 56 : hasTempo ? 38 : 0;
      const baseStaveHeight = showsRhythmOverlay ? 308 : 176;
      const staveHeight = baseStaveHeight + headerHeight;
      const staveTop = 34 + headerHeight;
      const noteSpacing = 48;
      const minMeasureWidth = 80;
      const firstMeasureLeadingWidth = measureFirstMeasureLeadingWidth(
        clef,
        staveHeight,
        staveTop,
        beatsPerMeasure,
        beatUnit,
        keySignatureStr,
      );
      const rightPadding = 20;

      // ---- Split notes at beat/measure boundaries & group into measures -----
      const measures = splitAndGroup(notes, beatsPerMeasure, beatUnit);

      // ---- Pass 1: Build VF notes & voices, compute min widths -------------
      const measureVoiceData = []; // { vfNotes, voice, displayNotes } or null

      for (let mi = 0; mi < measures.length; mi++) {
        const mNotes = measures[mi];
        if (mNotes.length === 0) {
          measureVoiceData.push(null);
          continue;
        }

        let prevAccidentals = {};
        const vfNotes = mNotes.map((dn) => {
          // For dotted notes, append 'd' to the VexFlow duration string.
          const dur = dn.isDotted ? dn.duration + 'd' : dn.duration;
          let vfNote;
          if (dn.isRest) {
            vfNote = new StaveNote({ clef, keys: [restAnchorPitch], duration: dur + 'r' });
          } else {
            const pitch = midiToPitch(dn.midi);
            vfNote = new StaveNote({ clef, keys: [pitch.toLowerCase()], duration: dur });

            const pc = dn.midi % 12;
            const naturalNote = [0,2,4,5,7,9,11].includes(pc);
            const inAlteredPitches = alteredPitches.includes(pc);

            if (!naturalNote && !inAlteredPitches) {
              if (prevAccidentals[dn.midi] !== '#') {
                vfNote.addModifier(new Accidental('#'));
                prevAccidentals[dn.midi] = '#';
              }
            }
          }

          // Add dot modifier for dotted notes.
          if (dn.isDotted) {
            Dot.buildAndAttach([vfNote], { all: true });
          }

          // Colouring: selected > default
          let color = '#333333';
          if (dn.globalIndex === selectedIndex) color = '#1976d2';
          vfNote.setStyle({ fillStyle: color, strokeStyle: color });

          return vfNote;
        });

        const voice = new Voice({
          num_beats: beatsPerMeasure,
          beat_value: beatUnit,
        }).setMode(Voice.Mode.SOFT);
        voice.addTickables(vfNotes);

        measureVoiceData.push({ vfNotes, voice, displayNotes: mNotes });
      }

      // ---- Compute widths (beat-based + VexFlow min width) -----------------
      const measureWidths = measures.map((m, idx) => {
        const totalBeats = m.reduce((s, n) => s + n.beats, 0);
        let w = Math.max(totalBeats * noteSpacing, minMeasureWidth);

        // Ask VexFlow for the minimum width needed to avoid overlap
        const mvd = measureVoiceData[idx];
        if (mvd) {
          try {
            const f = new Formatter();
            f.joinVoices([mvd.voice]);
            const minW = f.preCalculateMinTotalWidth([mvd.voice]);
            w = Math.max(w, minW + 20);
          } catch (e) {
            // Fallback: ensure minimum space per note
            w = Math.max(w, m.length * 30);
          }
        }

        if (idx === 0) w += firstMeasureLeadingWidth;
        return w + rightPadding;
      });

      const totalWidth = Math.max(measureWidths.reduce((a, b) => a + b, 0), 300);

      // ---- Set up renderer --------------------------------------------------
      const svgRenderer = new Renderer(container, Renderer.Backends.SVG);
      svgRenderer.resize(totalWidth, staveHeight);
      const ctx = svgRenderer.getContext();
      ctx.setFont('Arial', 10);

      // ---- Pass 2: Draw staves & render notes -------------------------------
      let xOffset = 0;
      const allVfNotes = [];      // flat array of VF note objects
      const allDisplayNotes = []; // flat array of display notes (for index mapping)
      const allStaves = [];       // one per measure
      const measureRenderData = [];

      for (let mi = 0; mi < measures.length; mi++) {
        const mWidth = measureWidths[mi];

        const stave = new Stave(xOffset, staveTop, mWidth);
        if (mi === 0) {
          stave.addClef(clef);
          stave.addKeySignature(keySignatureStr);
          stave.addTimeSignature(`${beatsPerMeasure}/${beatUnit}`);
        }
        stave.setContext(ctx).draw();
        allStaves.push(stave);

        const mvd = measureVoiceData[mi];
        if (mvd) {
          for (const vf of mvd.vfNotes) allVfNotes.push(vf);
          for (const dn of mvd.displayNotes) allDisplayNotes.push(dn);

          try {
            const formatter = new Formatter();
            formatter.joinVoices([mvd.voice]);
            const leadingWidth = mi === 0
              ? firstMeasureLeadingWidth
              : Math.max(
                  typeof stave.getNoteStartX === 'function'
                    ? stave.getNoteStartX() - stave.getX()
                    : 30,
                  30,
                );
            const noteWidth = mWidth - leadingWidth - rightPadding;
            measureRenderData.push({
              startX: stave.getX(),
              endX: stave.getX() + mWidth,
              contentStartX: stave.getX() + leadingWidth,
              contentEndX: stave.getX() + mWidth - rightPadding,
              contentWidth: Math.max(noteWidth, 40),
            });
            formatter.format([mvd.voice], Math.max(noteWidth, 40));

            // Beat-aware beam grouping
            const beams = beamNotesInMeasure(mvd.vfNotes, mvd.displayNotes, beatsPerMeasure, beatUnit);

            // Tuplet brackets: group display notes by tripletGroupId
            const tupletMap = new Map();
            for (let ni = 0; ni < mvd.displayNotes.length; ni++) {
              const gid = mvd.displayNotes[ni].tripletGroupId;
              if (gid != null) {
                if (!tupletMap.has(gid)) tupletMap.set(gid, []);
                tupletMap.get(gid).push(mvd.vfNotes[ni]);
              }
            }

            mvd.voice.draw(ctx, stave);
            beams.forEach(b => b.setContext(ctx).draw());

            // Draw tuplet brackets after voice so they overlay correctly.
            for (const [, tupNotes] of tupletMap) {
              if (tupNotes.length >= 2) {
                new Tuplet(tupNotes, {
                  num_notes: tupNotes.length,
                  notes_occupied: 2,
                }).setContext(ctx).draw();
              }
            }
          } catch (e) {
            console.warn('VexFlow render error in measure', mi, e);
          }
        } else {
          measureRenderData.push({
            startX: stave.getX(),
            endX: stave.getX() + mWidth,
            contentStartX: stave.getX() + 30,
            contentEndX: stave.getX() + mWidth - rightPadding,
            contentWidth: Math.max(mWidth - 30 - rightPadding, 40),
          });
        }

        xOffset += mWidth;
      }

      // ---- Render ties ------------------------------------------------------
      for (let i = 0; i < allDisplayNotes.length - 1; i++) {
        if (allDisplayNotes[i].tieStart && allDisplayNotes[i + 1].tieEnd) {
          new StaveTie({
            first_note: allVfNotes[i],
            last_note: allVfNotes[i + 1],
            first_indices: [0],
            last_indices: [0],
          }).setContext(ctx).draw();
        }
      }

      // ---- Render slurs / logical ties --------------------------------------
      const logicalNoteMap = new Map();
      for (let i = 0; i < allDisplayNotes.length; i++) {
        const globalIndex = allDisplayNotes[i].globalIndex;
        if (!logicalNoteMap.has(globalIndex)) {
          logicalNoteMap.set(globalIndex, []);
        }
        logicalNoteMap.get(globalIndex).push(allVfNotes[i]);
      }

      for (let i = 0; i < notes.length - 1; i++) {
        const source = notes[i];
        const target = notes[i + 1];
        if (!source.slurToNext || source.isRest || target.isRest) continue;

        const sourceNotes = logicalNoteMap.get(i);
        const targetNotes = logicalNoteMap.get(i + 1);
        if (!sourceNotes || !targetNotes) continue;

        const sourceAnchor = sourceNotes[sourceNotes.length - 1];
        const targetAnchor = targetNotes[0];
        const isTieLikeConnection = source.midi === target.midi;

        if (isTieLikeConnection) {
          new StaveTie({
            first_note: sourceAnchor,
            last_note: targetAnchor,
            first_indices: [0],
            last_indices: [0],
          }).setContext(ctx).draw();
          continue;
        }

        new Curve(sourceAnchor, targetAnchor, {
          cps: [
            { x: 0, y: 10 },
            { x: 0, y: 10 },
          ],
          invert: false,
          thickness: 2,
        }).setContext(ctx).draw();
      }

      // ---- Draw highlights & cursor ----------------------------------------
      const svg = container.querySelector('svg');
      if (svg) {
        rendererState.svg = svg;
        rendererState.measureRenderData = measureRenderData;
        rendererState.allDisplayNotes = allDisplayNotes;
        rendererState.allStaves = allStaves;
        // ---- Draw title & tempo marking as SVG text -------------------------
        const ns = svg.namespaceURI;

        if (hasTitle) {
          const titleEl = document.createElementNS(ns, 'text');
          titleEl.setAttribute('x', String(totalWidth / 2));
          titleEl.setAttribute('y', '30');
          titleEl.setAttribute('text-anchor', 'middle');
          titleEl.setAttribute('font-family', 'Arial, sans-serif');
          titleEl.setAttribute('font-size', '24');
          titleEl.setAttribute('font-weight', '800');
          titleEl.setAttribute('fill', '#4f463b');
          titleEl.textContent = title;
          svg.appendChild(titleEl);
        }

        if (bpm != null) {
          const tempoX = firstMeasureLeadingWidth + 8;
          const tempoY = hasTitle ? 62 : staveTop - 18;
          const tempoEl = document.createElementNS(ns, 'text');
          tempoEl.setAttribute('x', String(tempoX));
          tempoEl.setAttribute('y', String(tempoY));
          tempoEl.setAttribute('font-family', 'Arial, sans-serif');
          tempoEl.setAttribute('font-size', '18');
          tempoEl.setAttribute('font-weight', '600');
          tempoEl.setAttribute('fill', '#6c5e4b');
          tempoEl.textContent = '\u2669 = ' + bpm;
          svg.appendChild(tempoEl);
        }

        const resultHighlightLayer = document.createElementNS(ns, 'g');
        resultHighlightLayer.setAttribute('data-layer', 'rhythm-result-highlights');
        svg.appendChild(resultHighlightLayer);
        const overlayLayer = document.createElementNS(ns, 'g');
        overlayLayer.setAttribute('data-layer', 'rhythm-overlay');
        svg.appendChild(overlayLayer);
        rendererState.resultHighlightLayer = resultHighlightLayer;
        rendererState.overlayLayer = overlayLayer;
        rendererState.noteBaseColors = _buildNoteBaseColors(data);
        _captureRenderedNoteElements(svg, allDisplayNotes);
        _drawHighlights(svg, data, allStaves, allDisplayNotes);
        _drawCursorLine(
          svg,
          data,
          allVfNotes,
          allStaves,
          allDisplayNotes,
          measureWidths,
          firstMeasureLeadingWidth,
          rightPadding,
        );
        _attachTapHandlers(svg, data, allStaves, allDisplayNotes);
      }

      } catch (e) {
        console.warn('Score render error:', e);
        rendererState = _emptyRendererState();
        container.innerHTML = previousContent
          || '<p style="color:#b71c1c;padding:16px">Unable to render score</p>';
      }
    }

    function _buildNoteBaseColors(data) {
      const colors = new Map();
      const selectedColor = data.selectionKind === 'note' ? '#1976d2' : '#333333';
      for (let index = 0; index < data.notes.length; index++) {
        colors.set(
          index,
          index === data.selectedIndex ? selectedColor : '#333333',
        );
      }
      return colors;
    }

    function _captureRenderedNoteElements(svg, allDisplayNotes) {
      const noteElementsByIndex = new Map();
      const noteEls = svg.querySelectorAll('.vf-stavenote');
      for (let i = 0; i < allDisplayNotes.length; i++) {
        const noteEl = noteEls[i];
        if (!noteEl) {
          continue;
        }
        const noteIndex = allDisplayNotes[i].globalIndex;
        if (!noteElementsByIndex.has(noteIndex)) {
          noteElementsByIndex.set(noteIndex, []);
        }
        noteElementsByIndex.get(noteIndex).push(noteEl);
      }
      rendererState.noteElementsByIndex = noteElementsByIndex;
    }

    function _setRenderedNoteColor(noteEl, color) {
      const paintTargets = noteEl.querySelectorAll('path, rect, ellipse, circle, polygon, polyline');
      if (paintTargets.length === 0) {
        noteEl.setAttribute('fill', color);
        noteEl.setAttribute('stroke', color);
        return;
      }
      paintTargets.forEach((target) => {
        target.setAttribute('fill', color);
        target.setAttribute('stroke', color);
      });
    }

    function _setLogicalNoteColor(noteIndex, color) {
      const noteEls = rendererState.noteElementsByIndex.get(noteIndex);
      if (!noteEls) {
        return;
      }
      for (const noteEl of noteEls) {
        _setRenderedNoteColor(noteEl, color);
      }
    }

    function _syncPlaybackIndex(nextPlaybackIndex) {
      const playbackIndex = typeof nextPlaybackIndex === 'number' ? nextPlaybackIndex : -1;
      const previousPlaybackIndex = currentPlaybackIndex;
      currentPlaybackIndex = playbackIndex;

      if (rendererState.noteElementsByIndex.size === 0) {
        return;
      }

      if (previousPlaybackIndex >= 0 && previousPlaybackIndex !== playbackIndex) {
        _setLogicalNoteColor(
          previousPlaybackIndex,
          rendererState.noteBaseColors.get(previousPlaybackIndex) || '#333333',
        );
      }

      if (playbackIndex >= 0) {
        _setLogicalNoteColor(playbackIndex, '#43a047');
      }
    }

    function _clearSvgLayer(layer) {
      if (!layer) {
        return;
      }
      while (layer.firstChild) {
        layer.removeChild(layer.firstChild);
      }
    }

    function updateRhythmOverlay(rhythmTest) {
      currentRhythmOverlay = rhythmTest;
      const { svg, overlayLayer, resultHighlightLayer, allStaves, measureRenderData } = rendererState;
      if (!svg || !overlayLayer || !resultHighlightLayer) {
        rhythmViewportWasAutoFollowing = false;
        rendererState.rhythmOverlayPhase = null;
        rendererState.rhythmLiveOverlayHandles = null;
        return;
      }

      const nextPhase = rhythmTest ? rhythmTest.phase || 'idle' : null;
      const canPatchLive =
        nextPhase === 'live' &&
        rendererState.rhythmOverlayPhase === 'live' &&
        rendererState.rhythmOverlayLayout != null &&
        rendererState.rhythmLiveOverlayHandles != null;
      if (canPatchLive) {
        _syncLiveRhythmOverlay(
          rhythmTest,
          rendererState.rhythmOverlayLayout,
          rendererState.rhythmLiveOverlayHandles,
        );
        _clearSvgLayer(resultHighlightLayer);
        _syncRhythmViewport(rhythmTest, rendererState.rhythmOverlayLayout);
        return;
      }

      _detachRhythmInspectionContext();
      _clearRhythmInspectState();
      _clearSvgLayer(overlayLayer);
      _clearSvgLayer(resultHighlightLayer);
      const overlayRender = _drawRhythmOverlay(
        overlayLayer,
        svg,
        rhythmTest,
        allStaves,
        measureRenderData,
      );
      rendererState.rhythmOverlayLayout = overlayRender;
      rendererState.rhythmOverlayPhase = nextPhase;
      rendererState.rhythmLiveOverlayHandles = overlayRender
        ? overlayRender.liveHandles || null
        : null;
      _drawRhythmResultNoteHighlights(resultHighlightLayer, rhythmTest);
      _syncRhythmViewport(rhythmTest, rendererState.rhythmOverlayLayout);
    }

    function _syncLiveRhythmOverlay(rhythmTest, rhythmOverlayLayout, liveHandles) {
      if (!rhythmTest || !rhythmOverlayLayout || !liveHandles) {
        return;
      }

      const activePulseIndex = _activeRhythmPulseIndex(
        rhythmTest.playheadTimeSeconds,
        rhythmOverlayLayout.pulseDescriptors,
        'live',
      );
      _syncRhythmPulseRail(liveHandles.pulseElements, activePulseIndex, 'live');
      _syncLiveRhythmTapPoints(
        liveHandles.liveTapLayer,
        liveHandles,
        rhythmTest,
        rhythmOverlayLayout,
      );
      _syncLiveRhythmPlayhead(
        liveHandles.playheadLine,
        rhythmTest,
        rhythmOverlayLayout,
      );
    }

    function _syncLiveRhythmTapPoints(
      liveTapLayer,
      liveHandles,
      rhythmTest,
      rhythmOverlayLayout,
    ) {
      const tapEvents = rhythmTest.liveTapEvents || [];
      const renderedTapIds = liveHandles.renderedTapIds || [];
      const renderedCount = renderedTapIds.length;
      let needsReset = renderedCount > tapEvents.length;

      if (!needsReset) {
        for (let i = 0; i < renderedCount; i++) {
          if (renderedTapIds[i] !== tapEvents[i].id) {
            needsReset = true;
            break;
          }
        }
      }

      if (needsReset) {
        _clearSvgLayer(liveTapLayer);
        liveHandles.renderedTapIds = [];
      }

      for (let i = liveHandles.renderedTapIds.length; i < tapEvents.length; i++) {
        const tap = tapEvents[i];
        const tapX = _xForRhythmTime(
          tap.timeSeconds,
          rhythmOverlayLayout.measureSegments,
          rhythmTest.measureBoundaryTimesSeconds,
          rhythmTest.totalDurationSeconds,
          rhythmTest.countInDurationSeconds,
          rhythmOverlayLayout.leadInStartX,
          rhythmOverlayLayout.timeZeroX,
        );
        _appendLiveRhythmTapPoint(
          liveTapLayer,
          liveHandles.ns,
          tap.id,
          tapX,
          rhythmOverlayLayout.overlayBottom - 18,
        );
        liveHandles.renderedTapIds.push(tap.id);
      }
    }

    function _appendLiveRhythmTapPoint(target, ns, tapId, x, y) {
      const point = document.createElementNS(ns, 'circle');
      point.setAttribute('data-rhythm-live-tap-id', String(tapId));
      point.setAttribute('cx', x);
      point.setAttribute('cy', y);
      point.setAttribute('r', '3.5');
      point.setAttribute('fill', '#6d4c41');
      target.appendChild(point);
    }

    function _syncLiveRhythmPlayhead(playheadLine, rhythmTest, rhythmOverlayLayout) {
      if (!playheadLine) {
        return;
      }

      const playheadX = _xForRhythmTime(
        rhythmTest.playheadTimeSeconds,
        rhythmOverlayLayout.measureSegments,
        rhythmTest.measureBoundaryTimesSeconds,
        rhythmTest.totalDurationSeconds,
        rhythmTest.countInDurationSeconds,
        rhythmOverlayLayout.leadInStartX,
        rhythmOverlayLayout.timeZeroX,
      );
      playheadLine.setAttribute('x1', playheadX);
      playheadLine.setAttribute('x2', playheadX);
    }

    // -------------------------------------------------------------------------
    // Rhythm test overlay — draw the tap lane directly under the score.
    // -------------------------------------------------------------------------
    function _drawRhythmOverlay(
      target,
      svg,
      rhythmTest,
      allStaves,
      measureRenderData,
    ) {
      if (!rhythmTest || measureRenderData.length === 0) {
        _clearRhythmInspectState();
        _setRhythmInspectionContext(null);
        return null;
      }

      const ns = svg.namespaceURI;
      const overlayPhase = rhythmTest.phase || 'idle';
      const showsPlayhead = overlayPhase === 'live';
      const showsResultOverlay = overlayPhase === 'result';
      const measureSegments = _buildRhythmMeasureSegments(
        measureRenderData,
        rhythmTest.measureBoundaryTimesSeconds,
      );
      if (measureSegments.length === 0) {
        _clearRhythmInspectState();
        _setRhythmInspectionContext(null);
        return null;
      }

      const lastMeasure = measureSegments[measureSegments.length - 1];
      const leadInStartX = measureRenderData[0].startX;
      const timeZeroX = measureRenderData[0].contentStartX;
      const overlayTop = allStaves[0] ? allStaves[0].getYForLine(4) + 44 : 132;
      const overlayBottom = overlayTop + 66;
      const baselineY = (overlayTop + overlayBottom) / 2;
      const pulseDescriptors = _buildRhythmPulseDescriptors(
        measureSegments,
        rhythmTest.measureBoundaryTimesSeconds,
        rhythmTest.pulseDurationSeconds,
        rhythmTest.countInDurationSeconds,
        rhythmTest.totalDurationSeconds,
        leadInStartX,
        timeZeroX,
      );
      const activePulseIndex = _activeRhythmPulseIndex(
        rhythmTest.playheadTimeSeconds,
        pulseDescriptors,
        overlayPhase,
      );

      const lane = document.createElementNS(ns, 'rect');
      lane.setAttribute('x', leadInStartX);
      lane.setAttribute('y', overlayTop);
      lane.setAttribute('width', Math.max(lastMeasure.endX - leadInStartX, 40));
      lane.setAttribute('height', overlayBottom - overlayTop);
      lane.setAttribute('rx', '18');
      lane.setAttribute('fill', '#f6efe2');
      lane.setAttribute('stroke', '#d7ccb6');
      lane.setAttribute('stroke-width', '1');
      target.appendChild(lane);

      const leadIn = document.createElementNS(ns, 'rect');
      leadIn.setAttribute('x', leadInStartX);
      leadIn.setAttribute('y', overlayTop);
      leadIn.setAttribute('width', Math.max(timeZeroX - leadInStartX, 0));
      leadIn.setAttribute('height', overlayBottom - overlayTop);
      leadIn.setAttribute('rx', '18');
      leadIn.setAttribute('fill', 'rgba(110, 98, 84, 0.05)');
      target.appendChild(leadIn);

      const baseline = document.createElementNS(ns, 'line');
      baseline.setAttribute('x1', leadInStartX);
      baseline.setAttribute('x2', lastMeasure.endX);
      baseline.setAttribute('y1', baselineY);
      baseline.setAttribute('y2', baselineY);
      baseline.setAttribute('stroke', '#d5c8b1');
      baseline.setAttribute('stroke-width', '1.5');
      target.appendChild(baseline);

      for (let i = 0; i < measureSegments.length; i++) {
        const measure = measureSegments[i];
        _drawOverlayLine(
          target,
          ns,
          measure.startX,
          overlayTop + 10,
          overlayBottom - 10,
          '#bda98b',
          i === 0 ? 2.2 : 1.4,
        );
        const beatCount = Math.max(
          Math.round(measure.durationSeconds / rhythmTest.pulseDurationSeconds),
          1,
        );
        for (let beat = 1; beat < beatCount; beat++) {
          const beatX =
            measure.startX
            + ((measure.endX - measure.startX) * beat) / beatCount;
          _drawOverlayLine(
            target,
            ns,
            beatX,
            overlayTop + 21,
            overlayBottom - 21,
            'rgba(181, 163, 135, 0.35)',
            0.9,
          );
        }
      }
      _drawOverlayLine(target, ns, lastMeasure.endX, overlayTop + 10, overlayBottom - 10, '#bda98b', 2.2);
      const pulseElements = _drawRhythmPulseRail(
        target,
        ns,
        pulseDescriptors,
        activePulseIndex,
        { baselineY, overlayPhase },
      );

      if (!showsResultOverlay) {
        _clearRhythmInspectState();
        _setRhythmInspectionContext(null);
        const liveTapLayer = document.createElementNS(ns, 'g');
        target.appendChild(liveTapLayer);
        for (const tap of rhythmTest.liveTapEvents) {
          const tapX = _xForRhythmTime(
            tap.timeSeconds,
            measureSegments,
            rhythmTest.measureBoundaryTimesSeconds,
            rhythmTest.totalDurationSeconds,
            rhythmTest.countInDurationSeconds,
            leadInStartX,
            timeZeroX,
          );
          _appendLiveRhythmTapPoint(
            liveTapLayer,
            ns,
            tap.id,
            tapX,
            overlayBottom - 18,
          );
        }

        let playhead = null;
        if (showsPlayhead) {
          const playheadX = _xForRhythmTime(
            rhythmTest.playheadTimeSeconds,
            measureSegments,
            rhythmTest.measureBoundaryTimesSeconds,
            rhythmTest.totalDurationSeconds,
            rhythmTest.countInDurationSeconds,
            leadInStartX,
            timeZeroX,
          );
          playhead = document.createElementNS(ns, 'line');
          playhead.setAttribute('data-rhythm-playhead', 'true');
          playhead.setAttribute('x1', playheadX);
          playhead.setAttribute('x2', playheadX);
          playhead.setAttribute('y1', overlayTop - 8);
          playhead.setAttribute('y2', overlayBottom + 8);
          playhead.setAttribute('stroke', '#42a5f5');
          playhead.setAttribute('stroke-width', '2.5');
          playhead.setAttribute('stroke-linecap', 'round');
          target.appendChild(playhead);
        }

        return {
          measureSegments,
          leadInStartX,
          timeZeroX,
          overlayBottom,
          pulseDescriptors,
          contentEndX: lastMeasure.endX,
          liveHandles: {
            ns,
            pulseElements,
            liveTapLayer,
            playheadLine: playhead,
            renderedTapIds: rhythmTest.liveTapEvents.map((tap) => tap.id),
          },
        };
      }

      const expectedById = new Map();
      const resultTapById = new Map();
      const matchedPairByExpectedId = new Map();
      const matchedPairByTapId = new Map();
      const matchedExpectedIds = new Set();
      const matchedTapIds = new Set();
      const labelCandidates = [];
      const inspectionItems = new Map();
      const errorLabelThresholdBeats = rhythmTest.errorLabelThresholdBeats;
      const largeErrorThresholdBeats = rhythmTest.largeErrorThresholdBeats;

      for (const event of rhythmTest.expectedEvents) {
        expectedById.set(event.id, event);
      }
      for (const tap of rhythmTest.resultTapEvents) {
        resultTapById.set(tap.id, tap);
      }
      for (const pair of rhythmTest.matchedPairs) {
        matchedPairByExpectedId.set(pair.expectedId, pair);
        matchedPairByTapId.set(pair.tapId, pair);
      }

      for (const pair of rhythmTest.matchedPairs) {
        matchedExpectedIds.add(pair.expectedId);
        matchedTapIds.add(pair.tapId);

        const expectedEvent = expectedById.get(pair.expectedId);
        const tapEvent = resultTapById.get(pair.tapId);
        if (!expectedEvent || !tapEvent) continue;

        const expectedX = _xForRhythmTime(
          expectedEvent.timeSeconds,
          measureSegments,
          rhythmTest.measureBoundaryTimesSeconds,
          rhythmTest.totalDurationSeconds,
          rhythmTest.countInDurationSeconds,
          leadInStartX,
          timeZeroX,
        );
        const tapX = _xForRhythmTime(
          tapEvent.timeSeconds,
          measureSegments,
          rhythmTest.measureBoundaryTimesSeconds,
          rhythmTest.totalDurationSeconds,
          rhythmTest.countInDurationSeconds,
          leadInStartX,
          timeZeroX,
        );
        const errorBeats = pair.errorSeconds / rhythmTest.pulseDurationSeconds;
        const linkColor = Math.abs(errorBeats) > largeErrorThresholdBeats
          ? '#ef6c00'
          : '#2e7d32';

        const link = document.createElementNS(ns, 'line');
        link.setAttribute('x1', expectedX);
        link.setAttribute('y1', overlayTop + 18);
        link.setAttribute('x2', tapX);
        link.setAttribute('y2', overlayBottom - 18);
        link.setAttribute('stroke', linkColor);
        link.setAttribute('stroke-width', '3');
        link.setAttribute('stroke-linecap', 'round');
        target.appendChild(link);

        const linkKey = `pair:${pair.expectedId}:${pair.tapId}`;
        inspectionItems.set(
          linkKey,
          _buildMatchedRhythmInspectionItem(
            pair,
            expectedEvent,
            tapEvent,
            rhythmTest.measureBoundaryTimesSeconds,
            rhythmTest.pulseDurationSeconds,
            (expectedX + tapX) / 2,
          ),
        );
        _appendRhythmInspectHitLine(
          target,
          ns,
          expectedX,
          overlayTop + 18,
          tapX,
          overlayBottom - 18,
          linkKey,
        );

        if (Math.abs(errorBeats) > errorLabelThresholdBeats) {
          labelCandidates.push({
            x: (expectedX + tapX) / 2,
            text: _formatRhythmErrorBeats(errorBeats),
            color: linkColor,
          });
        }
      }

      for (const event of rhythmTest.expectedEvents) {
        const expectedX = _xForRhythmTime(
          event.timeSeconds,
          measureSegments,
          rhythmTest.measureBoundaryTimesSeconds,
          rhythmTest.totalDurationSeconds,
          rhythmTest.countInDurationSeconds,
          leadInStartX,
          timeZeroX,
        );
        _drawOverlayPoint(
          target,
          ns,
          expectedX,
          overlayTop + 18,
          matchedExpectedIds.has(event.id) ? '#1565c0' : '#c62828',
        );

        const matchedPair = matchedPairByExpectedId.get(event.id);
        const key = `expected:${event.id}`;
        inspectionItems.set(
          key,
          matchedPair == null
            ? _buildSingleRhythmInspectionItem({
                title: `Measure ${_rhythmMeasurePosition(
                  event.timeSeconds,
                  rhythmTest.measureBoundaryTimesSeconds,
                  rhythmTest.pulseDurationSeconds,
                ).measureNumber}`,
                lines: [
                  `Expected: ${_formatBeatValue(_rhythmMeasurePosition(
                    event.timeSeconds,
                    rhythmTest.measureBoundaryTimesSeconds,
                    rhythmTest.pulseDurationSeconds,
                  ).beat)}`,
                ],
                x: expectedX,
              })
            : _buildMatchedRhythmInspectionItem(
                matchedPair,
                event,
                resultTapById.get(matchedPair.tapId),
                rhythmTest.measureBoundaryTimesSeconds,
                rhythmTest.pulseDurationSeconds,
                expectedX,
              ),
        );
        _appendRhythmInspectHitPoint(
          target,
          ns,
          expectedX,
          overlayTop + 18,
          key,
        );
      }

      for (const tap of rhythmTest.resultTapEvents) {
        const tapX = _xForRhythmTime(
          tap.timeSeconds,
          measureSegments,
          rhythmTest.measureBoundaryTimesSeconds,
          rhythmTest.totalDurationSeconds,
          rhythmTest.countInDurationSeconds,
          leadInStartX,
          timeZeroX,
        );
        const color = matchedTapIds.has(tap.id) ? '#00897b' : '#ef6c00';
        _drawOverlayPoint(target, ns, tapX, overlayBottom - 18, color);

        const matchedPair = matchedPairByTapId.get(tap.id);
        const key = `tap:${tap.id}`;
        inspectionItems.set(
          key,
          matchedPair == null
            ? _buildSingleRhythmInspectionItem({
                title: `Measure ${_rhythmMeasurePosition(
                  tap.timeSeconds,
                  rhythmTest.measureBoundaryTimesSeconds,
                  rhythmTest.pulseDurationSeconds,
                ).measureNumber}`,
                lines: [
                  `Actual: ${_formatBeatValue(_rhythmMeasurePosition(
                    tap.timeSeconds,
                    rhythmTest.measureBoundaryTimesSeconds,
                    rhythmTest.pulseDurationSeconds,
                  ).beat)}`,
                ],
                x: tapX,
              })
            : _buildMatchedRhythmInspectionItem(
                matchedPair,
                expectedById.get(matchedPair.expectedId),
                tap,
                rhythmTest.measureBoundaryTimesSeconds,
                rhythmTest.pulseDurationSeconds,
                tapX,
              ),
        );
        _appendRhythmInspectHitPoint(
          target,
          ns,
          tapX,
          overlayBottom - 18,
          key,
        );
      }

      _drawRhythmErrorLabels(
        target,
        ns,
        labelCandidates,
        overlayTop + 6,
      );
      _setRhythmInspectionContext({
        svg,
        ns,
        inspectionItems,
        minX: leadInStartX,
        maxX: lastMeasure.endX,
        overlayTop,
      });

      return {
        measureSegments,
        leadInStartX,
        timeZeroX,
        contentEndX: lastMeasure.endX,
      };
    }

    function _buildRhythmMeasureSegments(
      measureRenderData,
      measureBoundaryTimesSeconds,
    ) {
      if (measureRenderData.length === 0) {
        return [];
      }

      const segments = [];
      for (let i = 0; i < measureRenderData.length; i++) {
        segments.push({
          startX: i === 0
            ? measureRenderData[0].contentStartX
            : measureRenderData[i].startX,
          endX: i + 1 < measureRenderData.length
            ? measureRenderData[i + 1].startX
            : measureRenderData[i].endX,
          durationSeconds:
            measureBoundaryTimesSeconds[i + 1] - measureBoundaryTimesSeconds[i],
        });
      }

      return segments;
    }

    function _buildRhythmPulseDescriptors(
      measureSegments,
      measureBoundaryTimesSeconds,
      pulseDurationSeconds,
      countInDurationSeconds,
      totalDurationSeconds,
      leadInStartX,
      timeZeroX,
    ) {
      if (!measureSegments || measureSegments.length === 0 || pulseDurationSeconds <= 0.0001) {
        return [];
      }

      const descriptors = [];
      let absolutePulseIndex = 0;
      const countInPulseCount = Math.max(
        Math.round(countInDurationSeconds / pulseDurationSeconds),
        0,
      );

      for (let pulseIndex = 0; pulseIndex < countInPulseCount; pulseIndex++) {
        const timeSeconds = -countInDurationSeconds + pulseIndex * pulseDurationSeconds;
        descriptors.push({
          absolutePulseIndex,
          measureIndex: -1,
          pulseIndexWithinMeasure: pulseIndex,
          timeSeconds,
          x: _xForRhythmTime(
            timeSeconds,
            measureSegments,
            measureBoundaryTimesSeconds,
            totalDurationSeconds,
            countInDurationSeconds,
            leadInStartX,
            timeZeroX,
          ),
          isCountIn: true,
        });
        absolutePulseIndex += 1;
      }

      const measureCount = Math.min(
        measureSegments.length,
        Math.max(measureBoundaryTimesSeconds.length - 1, 0),
      );
      for (let measureIndex = 0; measureIndex < measureCount; measureIndex++) {
        const startTime = measureBoundaryTimesSeconds[measureIndex];
        const endTime = measureBoundaryTimesSeconds[measureIndex + 1];
        if (endTime == null || endTime <= startTime + 0.0001) {
          continue;
        }

        const pulseCount = Math.max(
          Math.round((endTime - startTime) / pulseDurationSeconds),
          1,
        );
        for (let pulseIndex = 0; pulseIndex < pulseCount; pulseIndex++) {
          const timeSeconds = startTime + pulseIndex * pulseDurationSeconds;
          descriptors.push({
            absolutePulseIndex,
            measureIndex,
            pulseIndexWithinMeasure: pulseIndex,
            timeSeconds,
            x: _xForRhythmTime(
              timeSeconds,
              measureSegments,
              measureBoundaryTimesSeconds,
              totalDurationSeconds,
              countInDurationSeconds,
              leadInStartX,
              timeZeroX,
            ),
            isCountIn: false,
          });
          absolutePulseIndex += 1;
        }
      }

      return descriptors;
    }

    function _activeRhythmPulseIndex(playheadTimeSeconds, pulseDescriptors, overlayPhase) {
      if (overlayPhase !== 'live' || !pulseDescriptors || pulseDescriptors.length === 0) {
        return null;
      }

      const firstTime = pulseDescriptors[0].timeSeconds;
      const lastTime = pulseDescriptors[pulseDescriptors.length - 1].timeSeconds;
      const clampedTime = Math.min(Math.max(playheadTimeSeconds, firstTime), lastTime);
      for (let i = pulseDescriptors.length - 1; i >= 0; i--) {
        if (clampedTime >= pulseDescriptors[i].timeSeconds - 0.0001) {
          return i;
        }
      }

      return 0;
    }

    function _drawRhythmPulseRail(svg, ns, pulseDescriptors, activePulseIndex, layout) {
      if (!pulseDescriptors || pulseDescriptors.length === 0) {
        return [];
      }

      const pulseElements = [];

      for (let i = 0; i < pulseDescriptors.length; i++) {
        const descriptor = pulseDescriptors[i];
        const halo = document.createElementNS(ns, 'circle');
        halo.setAttribute('cx', descriptor.x);
        halo.setAttribute('cy', layout.baselineY);
        halo.setAttribute('data-rhythm-pulse-index', String(i));
        halo.setAttribute('data-rhythm-pulse-part', 'halo');
        svg.appendChild(halo);

        const ring = document.createElementNS(ns, 'circle');
        ring.setAttribute('cx', descriptor.x);
        ring.setAttribute('cy', layout.baselineY);
        ring.setAttribute('fill', 'none');
        ring.setAttribute('data-rhythm-pulse-index', String(i));
        ring.setAttribute('data-rhythm-pulse-part', 'ring');
        svg.appendChild(ring);

        const marker = document.createElementNS(ns, 'circle');
        marker.setAttribute('cx', descriptor.x);
        marker.setAttribute('cy', layout.baselineY);
        marker.setAttribute('data-rhythm-pulse-index', String(i));
        marker.setAttribute('data-rhythm-pulse-part', 'marker');
        svg.appendChild(marker);

        const elements = { halo, ring, marker };
        _applyRhythmPulseState(
          elements,
          activePulseIndex === i,
          activePulseIndex != null && i < activePulseIndex,
          layout.overlayPhase,
        );
        pulseElements.push(elements);
      }

      return pulseElements;
    }

    function _syncRhythmPulseRail(pulseElements, activePulseIndex, overlayPhase) {
      if (!pulseElements || pulseElements.length === 0) {
        return;
      }

      for (let i = 0; i < pulseElements.length; i++) {
        _applyRhythmPulseState(
          pulseElements[i],
          activePulseIndex === i,
          activePulseIndex != null && i < activePulseIndex,
          overlayPhase,
        );
      }
    }

    function _applyRhythmPulseState(elements, isActive, isPast, overlayPhase) {
      const isResultPhase = overlayPhase === 'result';
      const baseRadius = 4.4;
      const markerRadius = isActive ? baseRadius + 1.8 : baseRadius;

      elements.halo.setAttribute('r', markerRadius + 5.2);
      elements.halo.setAttribute('fill', 'rgba(189, 158, 112, 0.16)');
      elements.halo.setAttribute(
        'visibility',
        isActive && !isResultPhase ? 'visible' : 'hidden',
      );

      elements.ring.setAttribute('r', markerRadius + 3);
      elements.ring.setAttribute('stroke', 'rgba(171, 134, 83, 0.48)');
      elements.ring.setAttribute('stroke-width', '1.4');
      elements.ring.setAttribute(
        'visibility',
        isActive && !isResultPhase ? 'visible' : 'hidden',
      );

      elements.marker.setAttribute('r', markerRadius);
      elements.marker.setAttribute(
        'fill',
        isResultPhase
          ? '#c5b8a6'
          : isActive
          ? '#f0dfbf'
          : '#8b7760',
      );
      elements.marker.setAttribute(
        'fill-opacity',
        isResultPhase
          ? '0.78'
          : isActive
          ? '1'
          : isPast
          ? '0.42'
          : '0.68',
      );
      if (isActive && !isResultPhase) {
        elements.marker.setAttribute('stroke', '#9a7a4f');
        elements.marker.setAttribute('stroke-width', '1.1');
        return;
      }
      elements.marker.setAttribute('stroke', 'none');
    }

    function _drawOverlayLine(svg, ns, x, y1, y2, color, strokeWidth) {
      const line = document.createElementNS(ns, 'line');
      line.setAttribute('x1', x);
      line.setAttribute('x2', x);
      line.setAttribute('y1', y1);
      line.setAttribute('y2', y2);
      line.setAttribute('stroke', color);
      line.setAttribute('stroke-width', strokeWidth);
      svg.appendChild(line);
    }

    function _drawOverlayPoint(svg, ns, x, y, color) {
      const point = document.createElementNS(ns, 'circle');
      point.setAttribute('cx', x);
      point.setAttribute('cy', y);
      point.setAttribute('r', '3.5');
      point.setAttribute('fill', color);
      svg.appendChild(point);
    }

    function _appendRhythmInspectHitPoint(svg, ns, x, y, inspectKey) {
      const hitRadius = 14;
      const hit = document.createElementNS(ns, 'rect');
      hit.setAttribute('x', x - hitRadius);
      hit.setAttribute('y', y - hitRadius);
      hit.setAttribute('width', hitRadius * 2);
      hit.setAttribute('height', hitRadius * 2);
      hit.setAttribute('fill', 'rgba(0, 0, 0, 0)');
      hit.setAttribute('stroke', 'none');
      hit.setAttribute('data-rhythm-inspect-key', inspectKey);
      _attachRhythmInspectHandlers(hit, inspectKey);
      svg.appendChild(hit);
    }

    function _appendRhythmInspectHitLine(svg, ns, x1, y1, x2, y2, inspectKey) {
      const hit = document.createElementNS(ns, 'line');
      hit.setAttribute('x1', x1);
      hit.setAttribute('y1', y1);
      hit.setAttribute('x2', x2);
      hit.setAttribute('y2', y2);
      hit.setAttribute('stroke', 'transparent');
      hit.setAttribute('stroke-width', '18');
      hit.setAttribute('stroke-linecap', 'round');
      hit.setAttribute('data-rhythm-inspect-key', inspectKey);
      _attachRhythmInspectHandlers(hit, inspectKey);
      svg.appendChild(hit);
    }

    function _attachRhythmInspectHandlers(target, inspectKey) {
      target.style.cursor = 'pointer';
      target.addEventListener('mouseenter', function() {
        if (rhythmInspectionState.pinned) {
          return;
        }
        _setRhythmInspectState({ key: inspectKey, pinned: false });
      });
      target.addEventListener('mouseleave', function() {
        if (rhythmInspectionState.pinned) {
          return;
        }
        if (rhythmInspectionState.key === inspectKey) {
          _clearRhythmInspectState();
        }
      });
      target.addEventListener('click', function(event) {
        event.stopPropagation();
        if (rhythmInspectionState.pinned && rhythmInspectionState.key === inspectKey) {
          _clearRhythmInspectState();
          return;
        }
        _setRhythmInspectState({ key: inspectKey, pinned: true });
      });
    }

    function _buildMatchedRhythmInspectionItem(
      pair,
      expectedEvent,
      tapEvent,
      measureBoundaryTimesSeconds,
      pulseDurationSeconds,
      x,
    ) {
      if (!expectedEvent || !tapEvent) {
        return null;
      }

      const expectedPosition = _rhythmMeasurePosition(
        expectedEvent.timeSeconds,
        measureBoundaryTimesSeconds,
        pulseDurationSeconds,
      );
      const actualPosition = _rhythmMeasurePosition(
        tapEvent.timeSeconds,
        measureBoundaryTimesSeconds,
        pulseDurationSeconds,
      );
      const title = expectedPosition.measureNumber === actualPosition.measureNumber
        ? `Measure ${expectedPosition.measureNumber}`
        : `Expected M${expectedPosition.measureNumber} · Actual M${actualPosition.measureNumber}`;

      return {
        title,
        lines: [
          `Expected: ${_formatBeatValue(expectedPosition.beat)}`,
          `Actual: ${_formatBeatValue(actualPosition.beat)}`,
          `Δ: ${_formatSignedBeatValue(pair.errorSeconds / pulseDurationSeconds)} beat`,
        ],
        x,
      };
    }

    function _buildSingleRhythmInspectionItem({ title, lines, x }) {
      return { title, lines, x };
    }

    function _drawRhythmErrorLabels(svg, ns, labelCandidates, baselineY) {
      if (labelCandidates.length === 0) {
        return;
      }

      for (const candidate of labelCandidates) {
        _drawRotatedOverlayLabel(
          svg,
          ns,
          candidate.x,
          baselineY,
          candidate.text,
          candidate.color,
        );
      }
    }

    function _drawRotatedOverlayLabel(svg, ns, x, y, textContent, accentColor) {
      const text = document.createElementNS(ns, 'text');
      text.setAttribute('x', x);
      text.setAttribute('y', y);
      text.setAttribute('fill', accentColor);
      text.setAttribute('font-size', '12');
      text.setAttribute('font-weight', '700');
      text.setAttribute('text-anchor', 'middle');
      text.setAttribute('dominant-baseline', 'middle');
      text.setAttribute('transform', `rotate(-60 ${x} ${y})`);
      text.textContent = textContent;
      svg.appendChild(text);
    }

    function _renderRhythmInspectionTooltip() {
      const context = rhythmInspectionContext;
      if (!context) {
        return;
      }

      _removeRhythmInspectionTooltip();

      const activeKey = rhythmInspectionState.key;
      if (activeKey == null) {
        return;
      }

      const item = context.inspectionItems.get(activeKey);
      if (!item) {
        rhythmInspectionState = { key: null, pinned: false };
        return;
      }

      const { svg, ns, minX, maxX, overlayTop } = context;
      const group = document.createElementNS(ns, 'g');
      group.setAttribute('pointer-events', 'none');
      const text = document.createElementNS(ns, 'text');
      const lineHeight = 16;
      const cardPaddingX = 10;
      const cardPaddingY = 8;
      const cardInset = 12;
      const cardGap = 10;
      text.setAttribute('x', '0');
      text.setAttribute('y', '0');
      text.setAttribute('fill', '#2b251c');
      text.setAttribute('font-size', '12');
      text.setAttribute('font-weight', '700');
      text.setAttribute('text-anchor', 'middle');

      const titleSpan = document.createElementNS(ns, 'tspan');
      titleSpan.setAttribute('x', '0');
      titleSpan.setAttribute('dy', '0');
      titleSpan.setAttribute('font-weight', '800');
      titleSpan.textContent = item.title;
      text.appendChild(titleSpan);

      for (const line of item.lines) {
        const span = document.createElementNS(ns, 'tspan');
        span.setAttribute('x', '0');
        span.setAttribute('dy', String(lineHeight));
        span.setAttribute('font-weight', '700');
        span.textContent = line;
        text.appendChild(span);
      }

      group.appendChild(text);
      svg.appendChild(group);

      const textBox = text.getBBox();
      const cardWidth = textBox.width + cardPaddingX * 2;
      const minCenterX = minX + cardInset + cardWidth / 2;
      const maxCenterX = maxX - cardInset - cardWidth / 2;
      let centerX = item.x;
      if (minCenterX <= maxCenterX) {
        centerX = Math.min(Math.max(centerX, minCenterX), maxCenterX);
      } else {
        centerX = (minX + maxX) / 2;
      }
      const cardTop = Math.max(
        12,
        overlayTop - (textBox.height + cardPaddingY * 2) - cardGap,
      );
      group.setAttribute(
        'transform',
        `translate(${centerX} ${cardTop + cardPaddingY - textBox.y})`,
      );

      const rect = document.createElementNS(ns, 'rect');
      rect.setAttribute('x', textBox.x - cardPaddingX);
      rect.setAttribute('y', textBox.y - cardPaddingY);
      rect.setAttribute('width', cardWidth);
      rect.setAttribute('height', textBox.height + cardPaddingY * 2);
      rect.setAttribute('rx', '12');
      rect.setAttribute('fill', 'rgba(255, 253, 247, 0.96)');
      rect.setAttribute('stroke', '#d6ccba');
      rect.setAttribute('stroke-width', '1');
      group.insertBefore(rect, text);
      context.tooltipGroup = group;
    }

    function _setRhythmInspectState(nextState) {
      rhythmInspectionState = nextState;
      _renderRhythmInspectionTooltip();
    }

    function _setRhythmInspectionContext(nextContext) {
      _detachRhythmInspectionContext();
      if (nextContext == null) {
        return;
      }

      rhythmInspectionContext = {
        svg: nextContext.svg,
        ns: nextContext.ns,
        inspectionItems: nextContext.inspectionItems,
        minX: nextContext.minX,
        maxX: nextContext.maxX,
        overlayTop: nextContext.overlayTop,
        tooltipGroup: null,
      };
      _renderRhythmInspectionTooltip();
    }

    function _removeRhythmInspectionTooltip() {
      const context = rhythmInspectionContext;
      if (!context || !context.tooltipGroup) {
        return;
      }
      context.tooltipGroup.remove();
      context.tooltipGroup = null;
    }

    function _detachRhythmInspectionContext() {
      _removeRhythmInspectionTooltip();
      rhythmInspectionContext = null;
    }

    function _clearRhythmInspectState() {
      _setRhythmInspectState({ key: null, pinned: false });
    }

    function _rhythmMeasurePosition(
      timeSeconds,
      measureBoundaryTimesSeconds,
      pulseDurationSeconds,
    ) {
      if (!measureBoundaryTimesSeconds || measureBoundaryTimesSeconds.length < 2) {
        return {
          measureNumber: 1,
          beat: timeSeconds / pulseDurationSeconds,
        };
      }

      let measureIndex = Math.max(measureBoundaryTimesSeconds.length - 2, 0);
      for (let i = 0; i < measureBoundaryTimesSeconds.length - 1; i++) {
        if (timeSeconds < measureBoundaryTimesSeconds[i + 1] || i === measureBoundaryTimesSeconds.length - 2) {
          measureIndex = i;
          break;
        }
      }

      const measureStart = measureBoundaryTimesSeconds[measureIndex];
      return {
        measureNumber: measureIndex + 1,
        beat: (timeSeconds - measureStart) / pulseDurationSeconds,
      };
    }

    function _formatBeatValue(value) {
      return value.toFixed(2);
    }

    function _formatSignedBeatValue(value) {
      const rounded = value.toFixed(2);
      return value >= 0 ? `+${rounded}` : rounded;
    }

    function _formatRhythmErrorBeats(errorBeats) {
      const rounded = errorBeats.toFixed(2);
      return errorBeats >= 0 ? `+${rounded}` : rounded;
    }

    function _xForRhythmTime(
      timeSeconds,
      measureSegments,
      measureBoundaryTimesSeconds,
      totalDurationSeconds,
      countInDurationSeconds,
      leadInStartX,
      timeZeroX,
    ) {
      const lastMeasure = measureSegments[measureSegments.length - 1];
      const leadInWidth = Math.max(timeZeroX - leadInStartX, 0);
      if (timeSeconds <= 0) {
        if (countInDurationSeconds <= 0.0001 || leadInWidth <= 0.0001) {
          return timeZeroX;
        }
        const clampedLeadInTime = Math.max(timeSeconds, -countInDurationSeconds);
        const ratio =
          (clampedLeadInTime + countInDurationSeconds) / countInDurationSeconds;
        return leadInStartX + leadInWidth * ratio;
      }
      if (timeSeconds >= totalDurationSeconds) {
        return lastMeasure.endX;
      }

      const measureCount = Math.min(
        measureSegments.length,
        Math.max(measureBoundaryTimesSeconds.length - 1, 0),
      );
      for (let i = 0; i < measureCount; i++) {
        const startTime = measureBoundaryTimesSeconds[i];
        const endTime = measureBoundaryTimesSeconds[i + 1];
        if (endTime == null) continue;
        if (timeSeconds <= endTime || i === measureCount - 1) {
          const measure = measureSegments[i];
          const duration = Math.max(endTime - startTime, 0.001);
          const ratio = Math.min(Math.max((timeSeconds - startTime) / duration, 0), 1);
          return measure.startX + (measure.endX - measure.startX) * ratio;
        }
      }

      return lastMeasure.endX;
    }

    function _syncRhythmViewport(rhythmTest, rhythmOverlayLayout) {
      if (!rhythmTest || !rhythmOverlayLayout || !rhythmTest.shouldAutoFollowPlayback) {
        rhythmViewportWasAutoFollowing = false;
        return;
      }

      const playheadX = _xForRhythmTime(
        rhythmTest.playheadTimeSeconds,
        rhythmOverlayLayout.measureSegments,
        rhythmTest.measureBoundaryTimesSeconds,
        rhythmTest.totalDurationSeconds,
        rhythmTest.countInDurationSeconds,
        rhythmOverlayLayout.leadInStartX,
        rhythmOverlayLayout.timeZeroX,
      );
      const viewportWidth = scoreContainer.clientWidth;
      const maxScrollLeft = Math.max(scoreContainer.scrollWidth - viewportWidth, 0);
      const prereadOffset = viewportWidth * 0.36;
      const targetScrollLeft = Math.min(
        Math.max(playheadX - prereadOffset, 0),
        maxScrollLeft,
      );

      if (!rhythmViewportWasAutoFollowing) {
        scoreContainer.scrollLeft = targetScrollLeft;
        rhythmViewportWasAutoFollowing = true;
        return;
      }

      const currentScrollLeft = scoreContainer.scrollLeft;
      const nextScrollLeft =
        currentScrollLeft + (targetScrollLeft - currentScrollLeft) * 0.18;
      scoreContainer.scrollLeft =
        Math.abs(targetScrollLeft - nextScrollLeft) < 0.5
          ? targetScrollLeft
          : nextScrollLeft;
      rhythmViewportWasAutoFollowing = true;
    }

    // -------------------------------------------------------------------------
    // Highlights — blue semi-transparent rect behind selected element
    // -------------------------------------------------------------------------
    function _drawHighlights(svg, data, staves, allDisplayNotes) {
      const { selectionKind, selectedIndex } = data;
      if (!selectionKind) return;
      const ns = svg.namespaceURI;

      if (selectionKind === 'clef') {
        const el = svg.querySelector('.vf-clef');
        if (el) _highlightElement(svg, el, ns);
      } else if (selectionKind === 'timeSig') {
        const el = svg.querySelector('.vf-timesignature');
        if (el) _highlightElement(svg, el, ns);
      } else if (selectionKind === 'keySig') {
        const el = svg.querySelector('.vf-keysignature');
        if (el) _highlightElement(svg, el, ns);
      } else if (selectionKind === 'note' && selectedIndex >= 0) {
        const noteEls = svg.querySelectorAll('.vf-stavenote');
        for (let i = 0; i < allDisplayNotes.length; i++) {
          if (allDisplayNotes[i].globalIndex === selectedIndex && noteEls[i]) {
            _highlightElement(svg, noteEls[i], ns);
          }
        }
      }
    }

    function _drawRhythmResultNoteHighlights(layer, rhythmTest) {
      if (!rhythmTest || rhythmTest.phase !== 'result') return;

      const svg = rendererState.svg;
      if (!svg) {
        return;
      }
      const ns = svg.namespaceURI;
      const missedNoteIndices = new Set(rhythmTest.missedExpectedNoteIndices || []);
      const largeErrorNoteIndices = new Set(rhythmTest.largeErrorNoteIndices || []);
      const highlightedNoteIndices = new Set([
        ...missedNoteIndices,
        ...largeErrorNoteIndices,
      ]);

      for (const noteIndex of highlightedNoteIndices) {
        const noteEls = rendererState.noteElementsByIndex.get(noteIndex) || [];
        const options = missedNoteIndices.has(noteIndex)
          ? {
              fill: 'rgba(198, 40, 40, 0.14)',
              stroke: 'rgba(198, 40, 40, 0.72)',
            }
          : {
              fill: 'rgba(239, 108, 0, 0.16)',
              stroke: 'rgba(239, 108, 0, 0.75)',
            };
        for (const noteEl of noteEls) {
          _appendHighlightRect(layer, noteEl, ns, options);
        }
      }
    }

    function _createHighlightRect(el, ns, options = {}) {
      const bbox = el.getBBox();
      const rect = document.createElementNS(ns, 'rect');
      rect.setAttribute('x', bbox.x - 4);
      rect.setAttribute('y', bbox.y - 4);
      rect.setAttribute('width', bbox.width + 8);
      rect.setAttribute('height', bbox.height + 8);
      rect.setAttribute('rx', '4');
      rect.setAttribute('fill', options.fill || 'rgba(25, 118, 210, 0.15)');
      rect.setAttribute('stroke', options.stroke || 'rgba(25, 118, 210, 0.4)');
      rect.setAttribute('stroke-width', '1');
      return rect;
    }

    function _appendHighlightRect(layer, el, ns, options = {}) {
      const rect = _createHighlightRect(el, ns, options);
      layer.appendChild(rect);
    }

    function _highlightElement(svg, el, ns, options = {}) {
      const rect = _createHighlightRect(el, ns, options);
      // Insert before the element so it's behind
      el.parentNode.insertBefore(rect, el);
    }

    // -------------------------------------------------------------------------
    // Cursor — blinking vertical line at insert position
    // -------------------------------------------------------------------------
    function _drawCursorLine(
      svg,
      data,
      allVfNotes,
      allStaves,
      allDisplayNotes,
      measureWidths,
      firstMeasureLeadingWidth,
      rightPadding,
    ) {
      const { cursorIndex, selectionKind } = data;
      // Only show cursor in pure input mode (no selection)
      if (selectionKind) return;

      const ns = svg.namespaceURI;
      const noteEls = svg.querySelectorAll('.vf-stavenote');
      let cursorX;

      if (allVfNotes.length === 0) {
        // Empty score — cursor in the editable note area of the first measure.
        const noteAreaWidth = Math.max(
          measureWidths[0] - firstMeasureLeadingWidth - rightPadding,
          40,
        );
        cursorX = firstMeasureLeadingWidth + noteAreaWidth * 0.5;
      } else {
        // Find first display note whose globalIndex >= cursorIndex
        let displayIdx = -1;
        for (let i = 0; i < allDisplayNotes.length; i++) {
          if (allDisplayNotes[i].globalIndex >= cursorIndex) {
            displayIdx = i;
            break;
          }
        }

        if (displayIdx >= 0 && noteEls[displayIdx]) {
          const bbox = noteEls[displayIdx].getBBox();
          cursorX = bbox.x - 4;
        } else {
          // Cursor at end — place after last note
          const lastEl = noteEls[noteEls.length - 1];
          if (lastEl) {
            const bbox = lastEl.getBBox();
            cursorX = bbox.x + bbox.width + 10;
          }
        }
      }

      if (cursorX == null) return;

      // Find stave vertical bounds (first stave top line)
      const staveY = allStaves[0] ? allStaves[0].getYForLine(0) : 50;
      const staveYBottom = allStaves[0] ? allStaves[0].getYForLine(4) : 90;

      const line = document.createElementNS(ns, 'line');
      line.setAttribute('x1', cursorX);
      line.setAttribute('y1', staveY - 5);
