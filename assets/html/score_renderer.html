<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Score Renderer</title>
  <script src="https://cdn.jsdelivr.net/npm/vexflow@4.2.3/build/cjs/vexflow.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      background: transparent;
      overflow: hidden;
    }
    #score-container {
      width: 100%;
      height: 100%;
      overflow-x: auto;
      overflow-y: hidden;
      -webkit-overflow-scrolling: touch;
    }
    #score-canvas {
      display: block;
    }
  </style>
</head>
<body>
  <div id="score-container">
    <div id="score-canvas"></div>
  </div>

  <script>
    // -------------------------------------------------------------------------
    // VexFlow setup
    // -------------------------------------------------------------------------
    const { Renderer, Stave, StaveNote, Voice, Formatter,
            Accidental, KeySignature, TimeSignature, Barline,
            StaveConnector, Beam } = Vex.Flow;

    const container = document.getElementById('score-canvas');
    let renderer = null;
    let context = null;

    // Current render state
    let currentData = null;

    // -------------------------------------------------------------------------
    // Duration / pitch helpers
    // -------------------------------------------------------------------------

    // Convert our duration string to VexFlow duration key
    function toVfDuration(dur) {
      const map = {
        'whole': 'w',
        'half': 'h',
        'quarter': 'q',
        'eighth': '8',
        'sixteenth': '16',
      };
      return map[dur] || 'q';
    }

    // Convert MIDI number to VexFlow pitch string e.g. "C/4"
    function midiToPitch(midi) {
      const names = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
      const octave = Math.floor(midi / 12) - 1;
      const name = names[midi % 12];
      // Handle enharmonics for flat keys
      const flatNames = {
        'C#': 'Db', 'D#': 'Eb', 'F#': 'Gb', 'G#': 'Ab', 'A#': 'Bb'
      };
      return name + '/' + octave;
    }

    // Determine the accidental character for a given MIDI in a key.
    // Returns '#', 'b', 'n', or null.
    function accidentalForNote(midi, alteredPitches, accidentalOffset, prevAccidentals) {
      const pc = midi % 12;
      const key = midi; // use absolute midi as cache key

      if (alteredPitches.includes(pc)) {
        // This pitch class is altered by the key signature — no extra accidental needed
        // unless previously shown as natural in the same measure
        if (prevAccidentals[key] === 'n') {
          prevAccidentals[key] = accidentalOffset > 0 ? '#' : 'b';
          return accidentalOffset > 0 ? '#' : 'b';
        }
        return null;
      } else {
        // This pitch class is natural in key but might have been sharpened by key sig
        // check if it would have been altered — i.e. pc+1 or pc-1 is in alteredPitches
        const sharpedVersion = (pc + 1) % 12;
        const flattedVersion = (pc - 1 + 12) % 12;
        const needsNatural = alteredPitches.includes(sharpedVersion) || alteredPitches.includes(flattedVersion);
        if (needsNatural) {
          if (prevAccidentals[key] !== 'n') {
            prevAccidentals[key] = 'n';
            return 'n';
          }
        }
        return null;
      }
    }

    // -------------------------------------------------------------------------
    // Main render function
    // -------------------------------------------------------------------------
    function renderScore(data) {
      currentData = data;
      container.innerHTML = '';

      const { beatsPerMeasure, beatUnit, keySignatureStr, alteredPitches,
              accidentalOffset, notes, selectedIndex, cursorIndex, playbackIndex } = data;

      // ---- Layout constants ------------------------------------------------
      const staveHeight = 160;          // total height of one row
      const staveTop = 40;             // top padding to stave lines
      const noteSpacing = 48;          // pixels per beat
      const minMeasureWidth = 80;
      const leftPadding = 90;          // room for clef + key sig + time sig
      const rightPadding = 20;

      // ---- Group notes into measures ----------------------------------------
      const measures = [];
      let currentMeasure = [];
      let beatAcc = 0;

      for (let i = 0; i < notes.length; i++) {
        const n = notes[i];
        currentMeasure.push({ ...n, globalIndex: i });
        beatAcc += n.beats;
        if (Math.abs(beatAcc % beatsPerMeasure) < 0.001) {
          measures.push(currentMeasure);
          currentMeasure = [];
          beatAcc = 0;
        }
      }
      if (currentMeasure.length > 0) {
        measures.push(currentMeasure);
      }
      if (measures.length === 0) {
        measures.push([]); // empty score — show one blank measure
      }

      // ---- Compute widths ---------------------------------------------------
      const measureWidths = measures.map((m, idx) => {
        const totalBeats = m.reduce((s, n) => s + n.beats, 0);
        let w = Math.max(totalBeats * noteSpacing, minMeasureWidth);
        if (idx === 0) w += leftPadding; // first measure needs space for clef
        return w + rightPadding;
      });

      const totalWidth = Math.max(measureWidths.reduce((a, b) => a + b, 0), 300);

      // ---- Set up renderer --------------------------------------------------
      const svgRenderer = new Renderer(container, Renderer.Backends.SVG);
      svgRenderer.resize(totalWidth, staveHeight);
      const ctx = svgRenderer.getContext();
      ctx.setFont('Arial', 10);

      // ---- Map to track accidentals within each measure --------------------
      let prevAccidentals = {};

      // ---- Draw each measure -----------------------------------------------
      let xOffset = 0;
      let noteIndex = 0; // global note index tracker

      for (let mi = 0; mi < measures.length; mi++) {
        const mNotes = measures[mi];
        const mWidth = measureWidths[mi];
        prevAccidentals = {}; // reset per measure

        // Build stave
        const stave = new Stave(xOffset, staveTop, mWidth);

        if (mi === 0) {
          stave.addClef('treble');
          stave.addKeySignature(keySignatureStr);
          stave.addTimeSignature(`${beatsPerMeasure}/${beatUnit}`);
        } else {
          stave.addKeySignature(keySignatureStr);
        }

        stave.setContext(ctx).draw();

        // Build VexFlow notes for this measure
        if (mNotes.length > 0) {
          const vfNotes = mNotes.map((n, localIdx) => {
            const gi = n.globalIndex;
            const dur = toVfDuration(n.duration);

            let vfNote;
            if (n.isRest) {
              vfNote = new StaveNote({
                keys: ['b/4'],
                duration: dur + 'r',
              });
            } else {
              const pitch = midiToPitch(n.midi);
              vfNote = new StaveNote({
                keys: [pitch.toLowerCase()],
                duration: dur,
              });

              // Determine if we need an explicit accidental
              const pc = n.midi % 12;
              const naturalNote = [0,2,4,5,7,9,11].includes(pc);
              const inAlteredPitches = alteredPitches.includes(pc);

              if (!naturalNote) {
                // The note itself is a sharp (e.g. C# is pc=1)
                const accChar = (pc === (alteredPitches.find(a => (a % 12) === pc) ?? -99)) ? null
                  : '#'; // needs accidental
                if (!inAlteredPitches) {
                  const prevAcc = prevAccidentals[n.midi];
                  if (prevAcc !== '#') {
                    vfNote.addModifier(new Accidental('#'));
                    prevAccidentals[n.midi] = '#';
                  }
                }
              } else if (inAlteredPitches && accidentalOffset !== 0) {
                // Natural version of a key-altered pitch — need natural sign? 
                // This shouldn't happen after applyToMidi, but handle gracefully
              }
            }

            // Colouring: playback > selected > default
            let color = '#333333';
            if (gi === playbackIndex) color = '#43a047';
            else if (gi === selectedIndex) color = '#1976d2';

            vfNote.setStyle({ fillStyle: color, strokeStyle: color });

            return vfNote;
          });

          // Create cursor indicator (thin vertical line) before the cursor note
          // We'll draw it after the formatter so we know the X positions.

          // Fill partial measure with invisible rest if needed
          const totalBeats = mNotes.reduce((s, n) => s + n.beats, 0);
          const remainingBeats = beatsPerMeasure - (totalBeats % beatsPerMeasure);
          const allNotes = [...vfNotes];

          try {
            const voice = new Voice({
              num_beats: beatsPerMeasure,
              beat_value: beatUnit,
            }).setMode(Voice.Mode.SOFT);
            voice.addTickables(allNotes);

            const formatter = new Formatter();
            formatter.joinVoices([voice]);
            const noteWidth = mWidth - (mi === 0 ? leftPadding : 30) - rightPadding;
            formatter.format([voice], Math.max(noteWidth, 40));

            voice.draw(ctx, stave);
          } catch (e) {
            console.warn('VexFlow render error in measure', mi, e);
          }

          // Draw cursor line
          const cursorInMeasure = mNotes.findIndex(n => n.globalIndex === cursorIndex || 
            (cursorIndex > 0 && n.globalIndex === cursorIndex - 1));
          // We'll draw a simple cursor tick below the stave
        }

        xOffset += mWidth;
      }

      // ---- Draw cursor indicator -------------------------------------------
      // Simple approach: draw a blue triangle/arrow below the clue note
      _drawCursor(ctx, notes, cursorIndex, measures, measureWidths, staveTop, beatsPerMeasure, noteSpacing);

      // ---- Make SVG tappable -----------------------------------------------
      _attachTapHandlers(ctx, notes, measures, measureWidths, staveTop, beatsPerMeasure, noteSpacing);
    }

    // -------------------------------------------------------------------------
    // Draw cursor (inverted triangle below staff)
    // -------------------------------------------------------------------------
    function _drawCursor(ctx, notes, cursorIndex, measures, measureWidths, staveTop, beatsPerMeasure, noteSpacing) {
      // Find x position of cursor
      const cursorX = _xForGlobalIndex(cursorIndex, notes, measures, measureWidths, beatsPerMeasure, noteSpacing);
      if (cursorX === null) return;

      const staffBottom = staveTop + 4 * 10 + 20; // approx
      ctx.save();
      ctx.setFillStyle('#1976d2');
      ctx.setStrokeStyle('#1976d2');
      ctx.beginPath();
      ctx.moveTo(cursorX - 5, staffBottom + 8);
      ctx.lineTo(cursorX + 5, staffBottom + 8);
      ctx.lineTo(cursorX, staffBottom + 3);
      ctx.closePath();
      ctx.fill();
      ctx.restore();
    }

    // Compute approximate X position for a note global index
    function _xForGlobalIndex(globalIndex, notes, measures, measureWidths, beatsPerMeasure, noteSpacing) {
      if (notes.length === 0) return measureWidths[0] * 0.5;
      let xOff = 0;
      let beatAcc = 0;
      let noteIdx = 0;
      for (let mi = 0; mi < measures.length; mi++) {
        const mNotes = measures[mi];
        const mWidth = measureWidths[mi];
        const leftPad = mi === 0 ? 90 : 30;
        for (let li = 0; li < mNotes.length; li++) {
          if (mNotes[li].globalIndex === globalIndex) {
            const beatInMeasure = beatAcc % beatsPerMeasure;
            const totalBeats = mNotes.reduce((s,n)=>s+n.beats,0);
            // approximate: evenly spaced
            const frac = totalBeats > 0 ? (mNotes.slice(0,li).reduce((s,n)=>s+n.beats,0)) / totalBeats : 0;
            return xOff + leftPad + frac * (mWidth - leftPad - 20);
          }
          beatAcc += mNotes[li].beats;
        }
        // cursor at end of measure
        if (globalIndex === noteIdx + mNotes.length && mi === measures.length -1) {
          return xOff + mWidth - 20;
        }
        noteIdx += mNotes.length;
        xOff += mWidth;
      }
      return xOff; // end
    }

    // -------------------------------------------------------------------------
    // Attach tap handlers to SVG elements
    // -------------------------------------------------------------------------
    function _attachTapHandlers(ctx, notes, measures, measureWidths, staveTop, beatsPerMeasure, noteSpacing) {
      const svg = container.querySelector('svg');
      if (!svg) return;

      svg.style.touchAction = 'pan-x';

      svg.addEventListener('click', function(e) {
        const rect = svg.getBoundingClientRect();
        const x = e.clientX - rect.left;
        const y = e.clientY - rect.top;

        // Check if click is in the clef/time-sig region of measure 0
        if (x < 50 && y > staveTop && y < staveTop + 50) {
          _sendMessage({ type: 'timeSigTap' });
          return;
        }
        if (x >= 50 && x < 90 && y > staveTop && y < staveTop + 50) {
          _sendMessage({ type: 'keySigTap' });
          return;
        }

        // Try to find a note near the click using SVG note positions
        // VexFlow renders note heads as <path> elements; we'll use bounding box
        const noteEls = svg.querySelectorAll('.vf-stavenote');
        for (let i = 0; i < noteEls.length; i++) {
          const bbox = noteEls[i].getBoundingClientRect();
          const elX = bbox.left - rect.left + bbox.width / 2;
          const elY = bbox.top - rect.top + bbox.height / 2;
          if (Math.abs(x - elX) < 20 && Math.abs(y - elY) < 24) {
            _sendMessage({ type: 'noteTap', index: i });
            return;
          }
        }

        // Click on staff background — could be moving cursor or inserting
        _sendMessage({ type: 'bgTap', x: x, y: y });
      });
    }

    // -------------------------------------------------------------------------
    // Messaging bridge
    // -------------------------------------------------------------------------
    function _sendMessage(obj) {
      const json = JSON.stringify(obj);
      if (window.TapScore) {
        // Android / iOS JavascriptChannel
        window.TapScore.postMessage(json);
      } else if (window.flutter_inappwebview) {
        window.flutter_inappwebview.callHandler('TapScore', json);
      }
      // Web (iframe) — always post to parent
      if (window.parent && window.parent !== window) {
        window.parent.postMessage(json, '*');
      }
    }

    // Listen for render commands from Dart
    window.addEventListener('message', function(event) {
      try {
        const data = typeof event.data === 'string' ? JSON.parse(event.data) : event.data;
        if (data.type === 'render') {
          renderScore(data);
        }
      } catch(e) {
        console.error('message parse error', e);
      }
    });

    // Also expose a global function for runJavaScript calls
    window.renderFromDart = function(jsonStr) {
      try {
        const data = JSON.parse(jsonStr);
        renderScore(data);
      } catch(e) {
        console.error('renderFromDart error', e);
      }
    };

    // Notify Dart we are ready
    window.addEventListener('load', function() {
      _sendMessage({ type: 'ready' });
    });
  </script>
</body>
</html>
