<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Score Renderer</title>
  <script src="../vexflow/vexflow.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      background: transparent;
      overflow: hidden;
    }
    #score-container {
      width: 100%;
      height: 100%;
      overflow-x: auto;
      overflow-y: hidden;
      -webkit-overflow-scrolling: touch;
    }
    #score-canvas {
      display: block;
    }
  </style>
</head>
<body>
  <div id="score-container">
    <div id="score-canvas"></div>
  </div>

  <script>
    // -------------------------------------------------------------------------
    // VexFlow setup
    // -------------------------------------------------------------------------
    const { Renderer, Stave, StaveNote, Voice, Formatter,
            Accidental, KeySignature, TimeSignature, Barline,
            StaveConnector, Beam, Fraction, StaveTie, Tuplet, Dot } = Vex.Flow;

    const container = document.getElementById('score-canvas');

    // Current render state
    let currentData = null;

    // -------------------------------------------------------------------------
    // Duration / pitch helpers
    // -------------------------------------------------------------------------

    function midiToPitch(midi) {
      const names = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
      const octave = Math.floor(midi / 12) - 1;
      return names[midi % 12] + '/' + octave;
    }

    // Map beat count to VexFlow duration code.
    // Returns { dur, dotted } where dur is VexFlow string and dotted
    // indicates whether a dot modifier is needed.
    const _durationTable = [
      { beats: 6.0,   dur: 'w',  dotted: true  },
      { beats: 4.0,   dur: 'w',  dotted: false },
      { beats: 3.0,   dur: 'h',  dotted: true  },
      { beats: 2.0,   dur: 'h',  dotted: false },
      { beats: 1.5,   dur: 'q',  dotted: true  },
      { beats: 1.0,   dur: 'q',  dotted: false },
      { beats: 0.75,  dur: '8',  dotted: true  },
      { beats: 0.5,   dur: '8',  dotted: false },
      { beats: 0.375, dur: '16', dotted: true  },
      { beats: 0.25,  dur: '16', dotted: false },
    ];

    function beatsToDurationInfo(beats) {
      let best = _durationTable[_durationTable.length - 1];
      let bestDiff = Infinity;
      for (const entry of _durationTable) {
        const diff = Math.abs(beats - entry.beats);
        if (diff < 0.001) return { dur: entry.dur, dotted: entry.dotted };
        if (diff < bestDiff) { bestDiff = diff; best = entry; }
      }
      console.warn(`No exact duration for ${beats} beats, using ${best.dur}`);
      return { dur: best.dur, dotted: best.dotted };
    }

    function beatsToDuration(beats) {
      return beatsToDurationInfo(beats).dur;
    }

    // -------------------------------------------------------------------------
    // Split notes at beat/measure boundaries and group into measures.
    // Only notes starting off-beat are split at beat boundaries;
    // on-beat notes are only split at measure boundaries.
    // -------------------------------------------------------------------------
    function splitAndGroup(notes, beatsPerMeasure, beatUnit) {
      const measureDuration = beatsPerMeasure * (4 / beatUnit);
      const isCompound = beatUnit === 8 && beatsPerMeasure % 3 === 0;
      const effectiveBeatDur = isCompound ? 3 * (4 / beatUnit) : (4 / beatUnit);
      // Include dotted durations in the lookup table (sorted descending).
      const allBeats = [6.0, 4.0, 3.0, 2.0, 1.5, 1.0, 0.75, 0.5, 0.375, 0.25];

      const measures = [];
      let currentMeasure = [];
      let position = 0.0;

      // Identify triplet groups: collect consecutive indices sharing the same
      // tripletGroupId so we can emit them as an atomic unit.
      const tripletGroups = new Map(); // groupId -> [noteIndex, ...]
      for (let i = 0; i < notes.length; i++) {
        const gid = notes[i].tripletGroupId;
        if (gid != null) {
          if (!tripletGroups.has(gid)) tripletGroups.set(gid, []);
          tripletGroups.get(gid).push(i);
        }
      }

      let i = 0;
      while (i < notes.length) {
        const note = notes[i];

        // --- Triplet group handling ---
        // Emit all notes in a triplet group without splitting.
        if (note.tripletGroupId != null) {
          const group = tripletGroups.get(note.tripletGroupId);
          for (const gi of group) {
            const tn = notes[gi];
            // Dart sends effectiveBeats which already includes the 2/3 factor.
            // The VexFlow duration should be the *written* duration (without
            // the 2/3 factor). Written beats = effectiveBeats × 3/2.
            const writtenBeats = tn.beats * 1.5;
            const durInfo = beatsToDurationInfo(writtenBeats);

            currentMeasure.push({
              globalIndex: gi,
              midi: tn.midi,
              isRest: tn.isRest,
              beats: tn.beats,
              duration: durInfo.dur,
              isDotted: durInfo.dotted,
              tieStart: false,
              tieEnd: false,
              tripletGroupId: tn.tripletGroupId,
            });
            position += tn.beats;
          }
          // Skip past all notes in this group.
          i = group[group.length - 1] + 1;

          // Check measure boundary after triplet group.
          const measIdx = Math.floor((position - 0.0001) / measureDuration + 0.0001);
          const measureEnd = (measIdx + 1) * measureDuration;
          if (position >= measureEnd - 0.001) {
            measures.push(currentMeasure);
            currentMeasure = [];
          }
          continue;
        }

        // --- Normal / dotted note handling ---
        let remaining = note.beats;
        const noteStartPos = position;

        while (remaining > 0.001) {
          const measIdx = Math.floor(position / measureDuration + 0.0001);
          const measureStart = measIdx * measureDuration;
          const posInMeasure = position - measureStart;
          const spaceInMeasure = measureDuration - posInMeasure;

          const posInBeat = posInMeasure % effectiveBeatDur;
          const isOnBeat = posInBeat < 0.001 || posInBeat > effectiveBeatDur - 0.001;

          let maxSpace;
          if (!isOnBeat) {
            const currentBeatIdx = Math.floor(posInMeasure / effectiveBeatDur + 0.0001);
            const nextBeatBoundary = (currentBeatIdx + 1) * effectiveBeatDur;
            const spaceToBeat = nextBeatBoundary - posInMeasure;
            maxSpace = Math.min(spaceToBeat, spaceInMeasure, remaining);
          } else {
            maxSpace = Math.min(spaceInMeasure, remaining);
          }

          // Find largest duration (including dotted) that fits.
          let chunk = null;
          let chunkDotted = false;
          for (const d of allBeats) {
            if (d <= maxSpace + 0.001) {
              chunk = d;
              const info = beatsToDurationInfo(d);
              chunkDotted = info.dotted;
              break;
            }
          }

          // Remaining space too small for any standard duration — skip it.
          if (chunk == null) {
            remaining = 0;
            break;
          }

          const isTieStart = !note.isRest && (remaining - chunk > 0.001);
          const isTieEnd = !note.isRest && (position - noteStartPos > 0.001);

          currentMeasure.push({
            globalIndex: i,
            midi: note.midi,
            isRest: note.isRest,
            beats: chunk,
            duration: beatsToDuration(chunk),
            isDotted: chunkDotted,
            tieStart: isTieStart,
            tieEnd: isTieEnd,
            tripletGroupId: null,
          });

          position += chunk;
          remaining -= chunk;

          const newPosInMeasure = position - measureStart;
          if (newPosInMeasure >= measureDuration - 0.001) {
            measures.push(currentMeasure);
            currentMeasure = [];
          }
        }
        i++;
      }

      if (currentMeasure.length > 0) measures.push(currentMeasure);
      if (measures.length === 0) measures.push([]);

      return measures;
    }

    // -------------------------------------------------------------------------
    // Beat-aware beam grouping with secondary beam breaks
    // -------------------------------------------------------------------------
    function beamNotesInMeasure(vfNotes, displayNotes, beatsPerMeasure, beatUnit) {
      const isCompound = beatUnit === 8 && beatsPerMeasure % 3 === 0;
      const effectiveBeatDur = isCompound ? 3 * (4 / beatUnit) : (4 / beatUnit);
      const eighthDur = 0.5;

      // Compute onset of each note within the measure
      const onsets = [];
      let onset = 0.0;
      for (const dn of displayNotes) {
        onsets.push(onset);
        onset += dn.beats;
      }

      // Group beamable notes by beat
      const beatMap = new Map();
      for (let i = 0; i < displayNotes.length; i++) {
        const dur = vfNotes[i].getDuration();
        const isBeamable = !vfNotes[i].isRest() && (dur === '8' || dur === '16');
        if (!isBeamable) continue;

        const beatIdx = Math.floor(onsets[i] / effectiveBeatDur + 0.0001);
        if (!beatMap.has(beatIdx)) {
          beatMap.set(beatIdx, { vfNotes: [], onsets: [] });
        }
        beatMap.get(beatIdx).vfNotes.push(vfNotes[i]);
        beatMap.get(beatIdx).onsets.push(onsets[i]);
      }

      const beams = [];
      for (const [beatIdx, group] of beatMap) {
        if (group.vfNotes.length < 2) continue;

        const beam = new Beam(group.vfNotes);

        // In compound meters (6/8, 9/8, 12/8), break secondary beams at
        // eighth-note boundaries to show the sub-beat grouping.
        // In simple meters (4/4, 3/4, 2/4), VexFlow automatically handles
        // secondary beams based on note durations — no manual breaks needed.
        if (isCompound) {
          const beatStart = beatIdx * effectiveBeatDur;
          const breakIndices = [];
          for (let j = 1; j < group.vfNotes.length; j++) {
            const relOnset = group.onsets[j] - beatStart;
            if (relOnset > 0.001) {
              const mod = relOnset % eighthDur;
              if (mod < 0.001 || mod > eighthDur - 0.001) {
                breakIndices.push(j);
              }
            }
          }
          if (breakIndices.length > 0) {
            beam.breakSecondaryAt(breakIndices);
          }
        }
        beams.push(beam);
      }

      return beams;
    }

    function measureFirstMeasureLeadingWidth(staveHeight, staveTop, beatsPerMeasure, beatUnit, keySignatureStr) {
      const measurementHost = document.createElement('div');
      measurementHost.style.position = 'absolute';
      measurementHost.style.visibility = 'hidden';
      measurementHost.style.pointerEvents = 'none';
      measurementHost.style.left = '-10000px';
      measurementHost.style.top = '0';
      document.body.appendChild(measurementHost);

      try {
        const measurementRenderer = new Renderer(measurementHost, Renderer.Backends.SVG);
        measurementRenderer.resize(280, staveHeight);
        const measurementCtx = measurementRenderer.getContext();
        const measurementStave = new Stave(0, staveTop, 240);
        measurementStave.addClef('treble');
        measurementStave.addKeySignature(keySignatureStr);
        measurementStave.addTimeSignature(`${beatsPerMeasure}/${beatUnit}`);
        measurementStave.setContext(measurementCtx).draw();

        if (typeof measurementStave.getNoteStartX === 'function') {
          return Math.max(measurementStave.getNoteStartX() - measurementStave.getX(), 0);
        }

        const modifierEls = measurementHost.querySelectorAll('.vf-clef, .vf-keysignature, .vf-timesignature');
        let rightEdge = 0;
        modifierEls.forEach((el) => {
          const bbox = el.getBBox();
          rightEdge = Math.max(rightEdge, bbox.x + bbox.width);
        });
        return Math.max(rightEdge + 24, 90);
      } finally {
        measurementHost.remove();
      }
    }

    // -------------------------------------------------------------------------
    // Main render function
    // -------------------------------------------------------------------------
    function renderScore(data) {
      currentData = data;
      const previousContent = container.innerHTML;
      container.innerHTML = '';

      try {

      const { beatsPerMeasure, beatUnit, keySignatureStr, alteredPitches,
              accidentalOffset, notes, selectedIndex, cursorIndex,
              playbackIndex, selectionKind } = data;

      // ---- Layout constants ------------------------------------------------
      const staveHeight = 160;
      const staveTop = 40;
      const noteSpacing = 48;
      const minMeasureWidth = 80;
      const firstMeasureLeadingWidth = measureFirstMeasureLeadingWidth(
        staveHeight,
        staveTop,
        beatsPerMeasure,
        beatUnit,
        keySignatureStr,
      );
      const rightPadding = 20;

      // ---- Split notes at beat/measure boundaries & group into measures -----
      const measures = splitAndGroup(notes, beatsPerMeasure, beatUnit);

      // ---- Pass 1: Build VF notes & voices, compute min widths -------------
      const measureVoiceData = []; // { vfNotes, voice, displayNotes } or null

      for (let mi = 0; mi < measures.length; mi++) {
        const mNotes = measures[mi];
        if (mNotes.length === 0) {
          measureVoiceData.push(null);
          continue;
        }

        let prevAccidentals = {};
        const vfNotes = mNotes.map((dn) => {
          // For dotted notes, append 'd' to the VexFlow duration string.
          const dur = dn.isDotted ? dn.duration + 'd' : dn.duration;
          let vfNote;
          if (dn.isRest) {
            vfNote = new StaveNote({ keys: ['b/4'], duration: dur + 'r' });
          } else {
            const pitch = midiToPitch(dn.midi);
            vfNote = new StaveNote({ keys: [pitch.toLowerCase()], duration: dur });

            const pc = dn.midi % 12;
            const naturalNote = [0,2,4,5,7,9,11].includes(pc);
            const inAlteredPitches = alteredPitches.includes(pc);

            if (!naturalNote && !inAlteredPitches) {
              if (prevAccidentals[dn.midi] !== '#') {
                vfNote.addModifier(new Accidental('#'));
                prevAccidentals[dn.midi] = '#';
              }
            }
          }

          // Add dot modifier for dotted notes.
          if (dn.isDotted) {
            Dot.buildAndAttach([vfNote], { all: true });
          }

          // Colouring: playback > selected > default
          let color = '#333333';
          if (dn.globalIndex === playbackIndex) color = '#43a047';
          else if (dn.globalIndex === selectedIndex) color = '#1976d2';
          vfNote.setStyle({ fillStyle: color, strokeStyle: color });

          return vfNote;
        });

        const voice = new Voice({
          num_beats: beatsPerMeasure,
          beat_value: beatUnit,
        }).setMode(Voice.Mode.SOFT);
        voice.addTickables(vfNotes);

        measureVoiceData.push({ vfNotes, voice, displayNotes: mNotes });
      }

      // ---- Compute widths (beat-based + VexFlow min width) -----------------
      const measureWidths = measures.map((m, idx) => {
        const totalBeats = m.reduce((s, n) => s + n.beats, 0);
        let w = Math.max(totalBeats * noteSpacing, minMeasureWidth);

        // Ask VexFlow for the minimum width needed to avoid overlap
        const mvd = measureVoiceData[idx];
        if (mvd) {
          try {
            const f = new Formatter();
            f.joinVoices([mvd.voice]);
            const minW = f.preCalculateMinTotalWidth([mvd.voice]);
            w = Math.max(w, minW + 20);
          } catch (e) {
            // Fallback: ensure minimum space per note
            w = Math.max(w, m.length * 30);
          }
        }

        if (idx === 0) w += firstMeasureLeadingWidth;
        return w + rightPadding;
      });

      const totalWidth = Math.max(measureWidths.reduce((a, b) => a + b, 0), 300);

      // ---- Set up renderer --------------------------------------------------
      const svgRenderer = new Renderer(container, Renderer.Backends.SVG);
      svgRenderer.resize(totalWidth, staveHeight);
      const ctx = svgRenderer.getContext();
      ctx.setFont('Arial', 10);

      // ---- Pass 2: Draw staves & render notes -------------------------------
      let xOffset = 0;
      const allVfNotes = [];      // flat array of VF note objects
      const allDisplayNotes = []; // flat array of display notes (for index mapping)
      const allStaves = [];       // one per measure

      for (let mi = 0; mi < measures.length; mi++) {
        const mWidth = measureWidths[mi];

        const stave = new Stave(xOffset, staveTop, mWidth);
        if (mi === 0) {
          stave.addClef('treble');
          stave.addKeySignature(keySignatureStr);
          stave.addTimeSignature(`${beatsPerMeasure}/${beatUnit}`);
        }
        stave.setContext(ctx).draw();
        allStaves.push(stave);

        const mvd = measureVoiceData[mi];
        if (mvd) {
          for (const vf of mvd.vfNotes) allVfNotes.push(vf);
          for (const dn of mvd.displayNotes) allDisplayNotes.push(dn);

          try {
            const formatter = new Formatter();
            formatter.joinVoices([mvd.voice]);
            const leadingWidth = mi === 0
              ? firstMeasureLeadingWidth
              : Math.max(
                  typeof stave.getNoteStartX === 'function'
                    ? stave.getNoteStartX() - stave.getX()
                    : 30,
                  30,
                );
            const noteWidth = mWidth - leadingWidth - rightPadding;
            formatter.format([mvd.voice], Math.max(noteWidth, 40));

            // Beat-aware beam grouping
            const beams = beamNotesInMeasure(mvd.vfNotes, mvd.displayNotes, beatsPerMeasure, beatUnit);

            // Tuplet brackets: group display notes by tripletGroupId
            const tupletMap = new Map();
            for (let ni = 0; ni < mvd.displayNotes.length; ni++) {
              const gid = mvd.displayNotes[ni].tripletGroupId;
              if (gid != null) {
                if (!tupletMap.has(gid)) tupletMap.set(gid, []);
                tupletMap.get(gid).push(mvd.vfNotes[ni]);
              }
            }

            mvd.voice.draw(ctx, stave);
            beams.forEach(b => b.setContext(ctx).draw());

            // Draw tuplet brackets after voice so they overlay correctly.
            for (const [, tupNotes] of tupletMap) {
              if (tupNotes.length >= 2) {
                new Tuplet(tupNotes, {
                  num_notes: tupNotes.length,
                  notes_occupied: 2,
                }).setContext(ctx).draw();
              }
            }
          } catch (e) {
            console.warn('VexFlow render error in measure', mi, e);
          }
        }

        xOffset += mWidth;
      }

      // ---- Render ties ------------------------------------------------------
      for (let i = 0; i < allDisplayNotes.length - 1; i++) {
        if (allDisplayNotes[i].tieStart && allDisplayNotes[i + 1].tieEnd) {
          new StaveTie({
            first_note: allVfNotes[i],
            last_note: allVfNotes[i + 1],
            first_indices: [0],
            last_indices: [0],
          }).setContext(ctx).draw();
        }
      }

      // ---- Draw highlights & cursor ----------------------------------------
      const svg = container.querySelector('svg');
      if (svg) {
        _drawHighlights(svg, data, allStaves, allDisplayNotes);
        _drawCursorLine(
          svg,
          data,
          allVfNotes,
          allStaves,
          allDisplayNotes,
          measureWidths,
          firstMeasureLeadingWidth,
          rightPadding,
        );
        _attachTapHandlers(svg, data, allStaves, allDisplayNotes);
      }

      } catch (e) {
        console.warn('Score render error:', e);
        container.innerHTML = previousContent
          || '<p style="color:#b71c1c;padding:16px">Unable to render score</p>';
      }
    }

    // -------------------------------------------------------------------------
    // Highlights — blue semi-transparent rect behind selected element
    // -------------------------------------------------------------------------
    function _drawHighlights(svg, data, staves, allDisplayNotes) {
      const { selectionKind, selectedIndex } = data;
      if (!selectionKind) return;
      const ns = svg.namespaceURI;

      if (selectionKind === 'timeSig') {
        const el = svg.querySelector('.vf-timesignature');
        if (el) _highlightElement(svg, el, ns);
      } else if (selectionKind === 'keySig') {
        const el = svg.querySelector('.vf-keysignature');
        if (el) _highlightElement(svg, el, ns);
      } else if (selectionKind === 'note' && selectedIndex >= 0) {
        const noteEls = svg.querySelectorAll('.vf-stavenote');
        for (let i = 0; i < allDisplayNotes.length; i++) {
          if (allDisplayNotes[i].globalIndex === selectedIndex && noteEls[i]) {
            _highlightElement(svg, noteEls[i], ns);
          }
        }
      }
    }

    function _highlightElement(svg, el, ns) {
      const bbox = el.getBBox();
      const rect = document.createElementNS(ns, 'rect');
      rect.setAttribute('x', bbox.x - 4);
      rect.setAttribute('y', bbox.y - 4);
      rect.setAttribute('width', bbox.width + 8);
      rect.setAttribute('height', bbox.height + 8);
      rect.setAttribute('rx', '4');
      rect.setAttribute('fill', 'rgba(25, 118, 210, 0.15)');
      rect.setAttribute('stroke', 'rgba(25, 118, 210, 0.4)');
      rect.setAttribute('stroke-width', '1');
      // Insert before the element so it's behind
      el.parentNode.insertBefore(rect, el);
    }

    // -------------------------------------------------------------------------
    // Cursor — blinking vertical line at insert position
    // -------------------------------------------------------------------------
    function _drawCursorLine(
      svg,
      data,
      allVfNotes,
      allStaves,
      allDisplayNotes,
      measureWidths,
      firstMeasureLeadingWidth,
      rightPadding,
    ) {
      const { cursorIndex, selectionKind } = data;
      // Only show cursor in pure input mode (no selection)
      if (selectionKind) return;

      const ns = svg.namespaceURI;
      const noteEls = svg.querySelectorAll('.vf-stavenote');
      let cursorX;

      if (allVfNotes.length === 0) {
        // Empty score — cursor in the editable note area of the first measure.
        const noteAreaWidth = Math.max(
          measureWidths[0] - firstMeasureLeadingWidth - rightPadding,
          40,
        );
        cursorX = firstMeasureLeadingWidth + noteAreaWidth * 0.5;
      } else {
        // Find first display note whose globalIndex >= cursorIndex
        let displayIdx = -1;
        for (let i = 0; i < allDisplayNotes.length; i++) {
          if (allDisplayNotes[i].globalIndex >= cursorIndex) {
            displayIdx = i;
            break;
          }
        }

        if (displayIdx >= 0 && noteEls[displayIdx]) {
          const bbox = noteEls[displayIdx].getBBox();
          cursorX = bbox.x - 4;
        } else {
          // Cursor at end — place after last note
          const lastEl = noteEls[noteEls.length - 1];
          if (lastEl) {
            const bbox = lastEl.getBBox();
            cursorX = bbox.x + bbox.width + 10;
          }
        }
      }

      if (cursorX == null) return;

      // Find stave vertical bounds (first stave top line)
      const staveY = allStaves[0] ? allStaves[0].getYForLine(0) : 50;
      const staveYBottom = allStaves[0] ? allStaves[0].getYForLine(4) : 90;

      const line = document.createElementNS(ns, 'line');
      line.setAttribute('x1', cursorX);
      line.setAttribute('y1', staveY - 5);
      line.setAttribute('x2', cursorX);
      line.setAttribute('y2', staveYBottom + 5);
      line.setAttribute('stroke', '#1976d2');
      line.setAttribute('stroke-width', '2');
      line.setAttribute('opacity', '0.7');

      // Add blinking animation
      const animate = document.createElementNS(ns, 'animate');
      animate.setAttribute('attributeName', 'opacity');
      animate.setAttribute('values', '0.7;0.1;0.7');
      animate.setAttribute('dur', '1.2s');
      animate.setAttribute('repeatCount', 'indefinite');
      line.appendChild(animate);

      svg.appendChild(line);
    }

    // -------------------------------------------------------------------------
    // Tap handlers — use real SVG bounding boxes
    // -------------------------------------------------------------------------
    function _attachTapHandlers(svg, data, staves, allDisplayNotes) {
      const staveTop = staves[0] ? staves[0].getYForLine(0) : 40;
      const staveBottom = staves[0] ? staves[0].getYForLine(4) : 90;

      svg.style.touchAction = 'pan-x';

      svg.addEventListener('click', function(e) {
        const rect = svg.getBoundingClientRect();
        const x = e.clientX - rect.left;
        const y = e.clientY - rect.top;

        // Check time signature element
        const timeSigEl = svg.querySelector('.vf-timesignature');
        if (timeSigEl && _isClickOnElement(timeSigEl, rect, x, y, 10)) {
          _sendMessage({ type: 'timeSigTap' });
          return;
        }

        // Check key signature element
        const keySigEl = svg.querySelector('.vf-keysignature');
        if (keySigEl && _isClickOnElement(keySigEl, rect, x, y, 10)) {
          _sendMessage({ type: 'keySigTap' });
          return;
        }

        // Check note elements
        const noteEls = svg.querySelectorAll('.vf-stavenote');
        for (let i = 0; i < noteEls.length; i++) {
          if (_isClickOnElement(noteEls[i], rect, x, y, 8)) {
            _sendMessage({ type: 'noteTap', index: allDisplayNotes[i].globalIndex });
            return;
          }
        }

        // Background tap
        _sendMessage({ type: 'bgTap', x: x, y: y });
      });
    }

    function _isClickOnElement(el, svgRect, clickX, clickY, padding) {
      const bbox = el.getBoundingClientRect();
      const elX1 = bbox.left - svgRect.left - padding;
      const elX2 = bbox.right - svgRect.left + padding;
      const elY1 = bbox.top - svgRect.top - padding;
      const elY2 = bbox.bottom - svgRect.top + padding;
      return clickX >= elX1 && clickX <= elX2 && clickY >= elY1 && clickY <= elY2;
    }

    // -------------------------------------------------------------------------
    // Messaging bridge
    // -------------------------------------------------------------------------
    function _sendMessage(obj) {
      const json = JSON.stringify(obj);
      if (window.TapScore) {
        window.TapScore.postMessage(json);
      } else if (window.flutter_inappwebview) {
        window.flutter_inappwebview.callHandler('TapScore', json);
      }
      if (window.parent && window.parent !== window) {
        window.parent.postMessage(json, '*');
      }
    }

    window.addEventListener('message', function(event) {
      try {
        const data = typeof event.data === 'string' ? JSON.parse(event.data) : event.data;
        if (data.type === 'render') {
          renderScore(data);
        }
      } catch(e) {
        console.error('message parse error', e);
      }
    });

    window.renderFromDart = function(jsonStr) {
      try {
        renderScore(JSON.parse(jsonStr));
      } catch(e) {
        console.error('renderFromDart error', e);
      }
    };

    window.addEventListener('load', function() {
      _sendMessage({ type: 'ready' });
    });

    // Forward keyboard events to Dart so arrow keys work even when
    // the iframe has focus (e.g. after clicking a note on web).
    document.addEventListener('keydown', function(e) {
      const forwardedCodes = [
        'ArrowLeft', 'ArrowRight', 'ArrowUp', 'ArrowDown',
        'Delete', 'Backspace',
        'KeyD', 'KeyF', 'KeyG', 'KeyH', 'KeyJ', 'KeyK', 'KeyL',
        'Backquote',
        'Digit1', 'Digit2', 'Digit3', 'Digit4', 'Digit5', 'Digit6', 'Digit9',
      ];
      if (forwardedCodes.includes(e.code)) {
        e.preventDefault();
        _sendMessage({ type: 'keydown', key: e.key, code: e.code });
      }
    });
  </script>
</body>
</html>
