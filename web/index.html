<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="tap_score">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Tap Score</title>
  <link rel="manifest" href="manifest.json">
  <style>
    :root {
      color: #1f2933;
      background: #f6f1e7;
      font-family: Roboto, "Noto Sans SC", system-ui, sans-serif;
    }

    html, body {
      margin: 0;
      min-height: 100%;
      background:
        radial-gradient(circle at top, rgba(255, 252, 247, 0.96), rgba(242, 238, 229, 0.92)),
        linear-gradient(180deg, #fffdf7 0%, #f1ebdf 100%);
    }

    body {
      overflow: hidden;
    }

    #tap-score-bootstrap {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: grid;
      place-items: center;
      padding: 24px;
      background:
        radial-gradient(circle at top, rgba(255, 252, 247, 0.98), rgba(242, 238, 229, 0.94)),
        linear-gradient(180deg, #fffdf7 0%, #f1ebdf 100%);
      transition: opacity 220ms ease, visibility 220ms ease;
    }

    #tap-score-bootstrap.is-hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .bootstrap-card {
      width: min(100%, 440px);
      padding: 28px;
      border: 1px solid rgba(111, 101, 85, 0.14);
      border-radius: 28px;
      background: rgba(255, 252, 247, 0.9);
      box-shadow: 0 20px 48px rgba(78, 61, 43, 0.12);
      backdrop-filter: blur(8px);
    }

    .bootstrap-eyebrow {
      margin: 0 0 12px;
      color: #8a5c1b;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .bootstrap-title {
      margin: 0;
      color: #1f2933;
      font-size: 32px;
      font-weight: 800;
      line-height: 1.05;
    }

    .bootstrap-detail {
      margin: 14px 0 0;
      color: #52606d;
      font-size: 15px;
      font-weight: 500;
      line-height: 1.55;
    }

    .bootstrap-steps {
      margin: 24px 0 0;
      padding: 0;
      list-style: none;
      display: grid;
      gap: 12px;
    }

    .bootstrap-step {
      display: flex;
      align-items: center;
      gap: 12px;
      color: #52606d;
      font-size: 14px;
      font-weight: 600;
    }

    .bootstrap-step::before {
      content: "";
      flex: 0 0 12px;
      width: 12px;
      height: 12px;
      border-radius: 999px;
      border: 2px solid rgba(140, 122, 102, 0.45);
      background: transparent;
      box-sizing: border-box;
    }

    .bootstrap-step.is-active {
      color: #1f2933;
    }

    .bootstrap-step.is-active::before {
      border-color: #0f6cbd;
      border-top-color: transparent;
      animation: bootstrap-spin 0.9s linear infinite;
    }

    .bootstrap-step.is-complete::before {
      border-color: #0f8b6d;
      background: #0f8b6d;
    }

    .bootstrap-step.is-error::before {
      border-color: #b42318;
      background: #b42318;
      animation: none;
    }

    @keyframes bootstrap-spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div id="tap-score-bootstrap">
    <div class="bootstrap-card">
      <p class="bootstrap-eyebrow">Tap Score</p>
      <h1 id="tap-score-bootstrap-title" class="bootstrap-title">Starting Tap Score</h1>
      <p id="tap-score-bootstrap-detail" class="bootstrap-detail">
        Loading the app shell in your browser.
      </p>
      <ol class="bootstrap-steps">
        <li id="tap-score-bootstrap-step-browser" class="bootstrap-step is-active">
          Browser and Flutter bootstrap
        </li>
        <li id="tap-score-bootstrap-step-app" class="bootstrap-step">
          App shell ready
        </li>
        <li id="tap-score-bootstrap-step-workspace" class="bootstrap-step">
          Workspace prepares inside the app
        </li>
        <li id="tap-score-bootstrap-step-renderer" class="bootstrap-step">
          Loading score surface
        </li>
        <li id="tap-score-bootstrap-step-audio" class="bootstrap-step" hidden>
          Initializing Web Audio
        </li>
      </ol>
    </div>
  </div>
  <script>
    window.tapScoreBootstrap = (function() {
      var initialPath = window.location.pathname.replace(/\/+$/, '') || '/';
      var directWorkspaceRoute =
        initialPath === '/editor' || initialPath === '/practice';
      var root = document.getElementById('tap-score-bootstrap');
      var title = document.getElementById('tap-score-bootstrap-title');
      var detail = document.getElementById('tap-score-bootstrap-detail');
      var browserStep = document.getElementById('tap-score-bootstrap-step-browser');
      var appStep = document.getElementById('tap-score-bootstrap-step-app');
      var workspaceStep = document.getElementById('tap-score-bootstrap-step-workspace');
      var rendererStep = document.getElementById('tap-score-bootstrap-step-renderer');
      var audioStep = document.getElementById('tap-score-bootstrap-step-audio');

      function _normalizeState(state) {
        if (!state) return '';
        return state.indexOf('is-') === 0 ? state : 'is-' + state;
      }

      function _setStepState(element, state) {
        element.classList.remove('is-active', 'is-complete', 'is-error');
        if (state) {
          element.classList.add(_normalizeState(state));
        }
      }

      function _setStepLabel(element, label) {
        if (label) {
          element.textContent = label;
        }
      }

      function _setStepVisibility(element, visible) {
        element.hidden = !visible;
      }

      function _applyStage(config) {
        title.textContent = config.title;
        detail.textContent = config.detail;
        _setStepState(browserStep, config.browserState);
        _setStepState(appStep, config.appState);
        _setStepState(workspaceStep, config.workspaceState);
        _setStepState(rendererStep, config.rendererState);
        _setStepState(audioStep, config.audioState);
        _setStepLabel(workspaceStep, config.workspaceLabel);
        _setStepLabel(rendererStep, config.rendererLabel);
        _setStepLabel(audioStep, config.audioLabel);
        _setStepVisibility(audioStep, !!config.audioLabel);
        if (config.hide || config.yieldToFlutter) {
          root.classList.add('is-hidden');
        } else {
          root.classList.remove('is-hidden');
        }
      }

      function setStage(stage) {
        if (stage === 'engine') {
          _applyStage(
            {
              title: 'Starting Tap Score',
              detail: 'Flutter downloaded. Starting the engine.',
              browserState: 'complete',
              appState: 'active',
              workspaceState: 'pending',
              rendererState: 'pending'
            }
          );
          return;
        }

        if (stage === 'launch') {
          _applyStage(
            {
              title: 'Starting Tap Score',
              detail: 'Launching the app shell.',
              browserState: 'complete',
              appState: 'active',
              workspaceState: 'pending',
              rendererState: 'pending'
            }
          );
        }
      }

      function markFlutterReady() {
        if (!directWorkspaceRoute) {
          _applyStage({
            title: 'Tap Score is ready',
            detail: 'The app shell is on screen. Workspace setup continues inside the app when needed.',
            browserState: 'complete',
            appState: 'complete',
            workspaceState: 'pending',
            rendererState: 'pending',
            hide: true
          });
          return;
        }

        _applyStage({
          title: 'Preparing workspace',
          detail: 'Tap Score is restoring the workspace before opening the page.',
          browserState: 'complete',
          appState: 'complete',
          workspaceState: 'active',
          rendererState: 'pending',
          workspaceLabel: 'Workspace prepares inside the app',
          rendererLabel: 'Loading score surface'
        });
      }

      function fail(nextDetail) {
        title.textContent = 'Tap Score could not start';
        detail.textContent = nextDetail;
        _setStepState(browserStep, 'is-error');
        _setStepState(appStep, 'is-error');
        _setStepState(workspaceStep, 'is-error');
        _setStepState(rendererStep, 'is-error');
        _setStepState(audioStep, 'is-error');
      }

      function syncWorkspaceStartup(event) {
        var detailPayload = event && event.detail;
        if (typeof detailPayload !== 'string') {
          return;
        }

        try {
          var payload = JSON.parse(detailPayload);
          _applyStage({
            title: payload.title || 'Preparing workspace',
            detail: payload.detail || 'Tap Score is preparing the workspace.',
            browserState: 'complete',
            appState: 'complete',
            workspaceState: payload.workspaceState || 'pending',
            rendererState: payload.rendererState || 'pending',
            audioState: payload.audioState || '',
            workspaceLabel: payload.workspaceLabel || 'Workspace prepares inside the app',
            rendererLabel: payload.rendererLabel || 'Loading score surface',
            audioLabel: payload.audioLabel || '',
            hide: payload.dismissBootstrap === true,
            yieldToFlutter: payload.yieldToFlutter === true
          });
        } catch (_) {
          // Ignore malformed bridge payloads.
        }
      }

      window.addEventListener('tap-score:flutter-first-frame', function() {
        markFlutterReady();
      }, { once: true });
      window.addEventListener('tap-score:workspace-startup', syncWorkspaceStartup);

      return {
        fail: fail,
        markFlutterReady: markFlutterReady,
        setStage: setStage,
        syncWorkspaceStartup: syncWorkspaceStartup,
      };
    })();

    var _soundfontScriptPath = 'soundfonts/acoustic_grand_piano-mp3.js';
    var _soundfontLoadPromise = null;
    var _audioCtx = null;
    var _soundfontNotes = null;
    var _noteBuffers = {};
    var _noteDecodePromises = {};
    var _activeWebNotes = {};
    var _nextWebNoteHandleId = 1;
    var _webAudioReady = false;
    var _webAudioInitError = '';
    var _webAudioInitPromise = null;

    function _ensureSoundfontScript() {
      if (window.MIDI && MIDI.Soundfont && MIDI.Soundfont.acoustic_grand_piano) {
        return Promise.resolve(MIDI.Soundfont.acoustic_grand_piano);
      }

      if (_soundfontLoadPromise) {
        return _soundfontLoadPromise;
      }

      _soundfontLoadPromise = new Promise(function(resolve, reject) {
        var existing = document.querySelector('script[data-tap-score-soundfont="true"]');
        if (existing) {
          existing.addEventListener('load', function() {
            if (window.MIDI && MIDI.Soundfont && MIDI.Soundfont.acoustic_grand_piano) {
              resolve(MIDI.Soundfont.acoustic_grand_piano);
              return;
            }
            reject(new Error('Piano soundfont data not found'));
          }, { once: true });
          existing.addEventListener('error', function() {
            reject(new Error('Failed to load piano soundfont script'));
          }, { once: true });
          return;
        }

        var script = document.createElement('script');
        script.src = _soundfontScriptPath;
        script.async = true;
        script.dataset.tapScoreSoundfont = 'true';
        script.onload = function() {
          if (window.MIDI && MIDI.Soundfont && MIDI.Soundfont.acoustic_grand_piano) {
            resolve(MIDI.Soundfont.acoustic_grand_piano);
            return;
          }

          reject(new Error('Piano soundfont data not found'));
        };
        script.onerror = function() {
          reject(new Error('Failed to load piano soundfont script'));
        };
        document.head.appendChild(script);
      }).catch(function(error) {
        _soundfontLoadPromise = null;
        throw error;
      });

      return _soundfontLoadPromise;
    }

    function _noteNameToMidi(name) {
      var noteMap = {C:0, D:2, E:4, F:5, G:7, A:9, B:11};
      var m = name.match(/^([A-G])([b#]?)(\d+)$/);
      if (!m) return -1;
      var base = noteMap[m[1]];
      if (m[2] === 'b') base--;
      if (m[2] === '#') base++;
      return (parseInt(m[3]) + 1) * 12 + base;
    }

    function _midiToNoteName(midi) {
      var names = ['C', 'Db', 'D', 'Eb', 'E', 'F', 'Gb', 'G', 'Ab', 'A', 'Bb', 'B'];
      var pitchClass = ((midi % 12) + 12) % 12;
      var octave = Math.floor(midi / 12) - 1;
      return names[pitchClass] + octave;
    }

    function _getSoundfontDataForMidi(midi) {
      if (!_soundfontNotes) return null;

      var noteName = _midiToNoteName(midi);
      if (_soundfontNotes[noteName]) {
        return _soundfontNotes[noteName];
      }

      var sharpName = noteName.replace('Db', 'C#')
        .replace('Eb', 'D#')
        .replace('Gb', 'F#')
        .replace('Ab', 'G#')
        .replace('Bb', 'A#');
      return _soundfontNotes[sharpName] || null;
    }

    function _decodeBase64Audio(dataUri) {
      var base64 = dataUri.split(',')[1];
      var binary = atob(base64);
      var bytes = new Uint8Array(binary.length);
      for (var i = 0; i < binary.length; i++) {
        bytes[i] = binary.charCodeAt(i);
      }
      return _audioCtx.decodeAudioData(bytes.buffer.slice(0));
    }

    function _ensureNoteBuffer(midi) {
      if (_noteBuffers[midi]) {
        return Promise.resolve(_noteBuffers[midi]);
      }

      if (_noteDecodePromises[midi]) {
        return _noteDecodePromises[midi];
      }

      var dataUri = _getSoundfontDataForMidi(midi);
      if (!dataUri) {
        return Promise.reject(new Error('No soundfont data for MIDI ' + midi));
      }

      _noteDecodePromises[midi] = _decodeBase64Audio(dataUri)
        .then(function(buf) {
          _noteBuffers[midi] = buf;
          delete _noteDecodePromises[midi];
          return buf;
        })
        .catch(function(error) {
          delete _noteDecodePromises[midi];
          throw error;
        });

      return _noteDecodePromises[midi];
    }

    function _warmupNotes(limit) {
      if (!_soundfontNotes || !_audioCtx) return;

      var decoded = 0;
      for (var noteName in _soundfontNotes) {
        var midi = _noteNameToMidi(noteName);
        if (midi < 0 || _noteBuffers[midi] || _noteDecodePromises[midi]) {
          continue;
        }

        _ensureNoteBuffer(midi).catch(function(error) {
          console.warn('Failed to decode warmup note', error);
        });

        decoded++;
        if (decoded >= limit) {
          break;
        }
      }
    }

    window.initWebAudio = async function() {
      if (_webAudioReady) return true;
      if (_webAudioInitPromise) return _webAudioInitPromise;

      _webAudioInitError = '';
      _webAudioInitPromise = (async function() {
      if (!_audioCtx) {
        _audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
      // Don't await resume() here — browser autoplay policy blocks it
      // until a user gesture. We'll resume in playWebNote instead.
      if (_audioCtx.state === 'suspended') {
        _audioCtx.resume().catch(function() {});
      }
      if (Object.keys(_noteBuffers).length > 0) {
        _webAudioReady = true;
        return true;
      }

      _soundfontNotes = await _ensureSoundfontScript();
      if (!_soundfontNotes) {
        _webAudioInitError = 'Piano soundfont data not found';
        console.error(_webAudioInitError);
        return false;
      }

      _webAudioReady = true;
      _warmupNotes(12);

      console.log('Web Audio Piano Initialized');
      return true;
      })();

      try {
        return await _webAudioInitPromise;
      } catch (error) {
        _webAudioInitError = error && error.message ? error.message : String(error);
        console.error(_webAudioInitError);
        return false;
      } finally {
        _webAudioInitPromise = null;
      }
    };

    window.isWebAudioReady = function() {
      return _webAudioReady;
    };

    window.getWebAudioInitError = function() {
      return _webAudioInitError;
    };

    window.preloadWebNotes = async function(midis) {
      if (!Array.isArray(midis)) {
        throw new Error('Expected a MIDI note list for preload');
      }

      var initialized = await window.initWebAudio();
      if (!initialized) {
        throw new Error(_webAudioInitError || 'Web Audio is not ready');
      }

      var uniqueMidis = [];
      var seen = {};
      for (var i = 0; i < midis.length; i++) {
        var midi = Number(midis[i]);
        if (!Number.isFinite(midi)) {
          throw new Error('Invalid MIDI note in preload request');
        }
        midi = Math.max(0, Math.min(127, Math.round(midi)));
        if (seen[midi]) {
          continue;
        }
        seen[midi] = true;
        uniqueMidis.push(midi);
      }

      await Promise.all(uniqueMidis.map(function(midi) {
        return _ensureNoteBuffer(midi);
      }));
    };

    window.playWebNote = function(midi, velocity) {
      if (!_audioCtx || !_webAudioReady) return -1;

      // Resume AudioContext on user gesture (browser autoplay policy)
      if (_audioCtx.state === 'suspended') {
        _audioCtx.resume().catch(function() {});
      }

      var handleId = _nextWebNoteHandleId++;
      var entry = { source: null, stopped: false };
      _activeWebNotes[handleId] = entry;

      _ensureNoteBuffer(midi).then(function(buffer) {
      if (!_activeWebNotes[handleId] || entry.stopped) {
        delete _activeWebNotes[handleId];
        return;
      }

      var source = _audioCtx.createBufferSource();
      var gain = _audioCtx.createGain();
      gain.gain.value = velocity / 127.0;
      source.buffer = buffer;
      source.connect(gain);
      gain.connect(_audioCtx.destination);
      source.onended = function() {
        if (_activeWebNotes[handleId] === entry) {
          delete _activeWebNotes[handleId];
        }
      };
      entry.source = source;
      source.start();
      }).catch(function(error) {
        console.warn('Failed to play note', midi, error);
        delete _activeWebNotes[handleId];
      });

      return handleId;
    };

    window.stopWebNote = function(handleId) {
      var entry = _activeWebNotes[handleId];
      if (entry) {
        entry.stopped = true;
        if (entry.source) {
          try { entry.source.stop(); } catch(e) {}
        }
        delete _activeWebNotes[handleId];
      }
    };
  </script>
  <script src="flutter_bootstrap.js?v=__TAP_SCORE_DEPLOY_ID__" async></script>
</body>
</html>
