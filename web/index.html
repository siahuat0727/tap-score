<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="tap_score">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>tap_score</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <script src="soundfonts/acoustic_grand_piano-mp3.js"></script>
  <script>
    var _audioCtx = null;
    var _noteBuffers = {};
    var _activeWebNotes = {};

    function _noteNameToMidi(name) {
      var noteMap = {C:0, D:2, E:4, F:5, G:7, A:9, B:11};
      var m = name.match(/^([A-G])([b#]?)(\d+)$/);
      if (!m) return -1;
      var base = noteMap[m[1]];
      if (m[2] === 'b') base--;
      if (m[2] === '#') base++;
      return (parseInt(m[3]) + 1) * 12 + base;
    }

    window.initWebAudio = async function() {
      if (!_audioCtx) {
        _audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
      if (_audioCtx.state === 'suspended') {
        await _audioCtx.resume();
      }
      if (Object.keys(_noteBuffers).length > 0) return;

      var notes = (window.MIDI && MIDI.Soundfont)
        ? MIDI.Soundfont.acoustic_grand_piano : null;
      if (!notes) {
        console.error('Piano soundfont data not found');
        return;
      }

      var decodePromises = [];
      for (var noteName in notes) {
        (function(name, dataUri) {
          var midi = _noteNameToMidi(name);
          if (midi < 0) return;
          var base64 = dataUri.split(',')[1];
          var binary = atob(base64);
          var bytes = new Uint8Array(binary.length);
          for (var i = 0; i < binary.length; i++) {
            bytes[i] = binary.charCodeAt(i);
          }
          decodePromises.push(
            _audioCtx.decodeAudioData(bytes.buffer.slice(0)).then(function(buf) {
              _noteBuffers[midi] = buf;
            }).catch(function(e) {
              console.warn('Failed to decode note', name, e);
            })
          );
        })(noteName, notes[noteName]);
      }

      await Promise.all(decodePromises);
      console.log('Web Audio Piano Initialized (' + Object.keys(_noteBuffers).length + ' notes)');
    };

    window.playWebNote = function(midi, velocity) {
      if (!_audioCtx || !_noteBuffers[midi]) return;
      var source = _audioCtx.createBufferSource();
      var gain = _audioCtx.createGain();
      gain.gain.value = velocity / 127.0;
      source.buffer = _noteBuffers[midi];
      source.connect(gain);
      gain.connect(_audioCtx.destination);
      source.start();
      _activeWebNotes[midi] = { source: source, gain: gain };
    };

    window.stopWebNote = function(midi) {
      if (_activeWebNotes[midi]) {
        try { _activeWebNotes[midi].source.stop(); } catch(e) {}
        delete _activeWebNotes[midi];
      }
    };
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
