<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="tap_score">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>tap_score</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <script src="https://unpkg.com/soundfont-player@0.10.2/dist/soundfont-player.min.js"></script>
  <script>
    var _audioCtx = null;
    var _pianoInstrument = null;
    var _activeWebNotes = {};

    window.initWebAudio = async function() {
      if (!_audioCtx) {
        _audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
      if (_audioCtx.state === 'suspended') {
        _audioCtx.resume();
      }
      if (!_pianoInstrument) {
        _pianoInstrument = await Soundfont.instrument(_audioCtx, 'acoustic_grand_piano');
        console.log("Web Audio Piano Initialized");
      }
    };

    window.playWebNote = function(midi, velocity) {
      if (_pianoInstrument) {
        var note = _pianoInstrument.play(midi, _audioCtx.currentTime, { gain: velocity / 127.0 });
        _activeWebNotes[midi] = note;
      }
    };

    window.stopWebNote = function(midi) {
      if (_activeWebNotes[midi]) {
        _activeWebNotes[midi].stop();
        delete _activeWebNotes[midi];
      }
    };
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
